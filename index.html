<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRITOIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4; --ratp-green: #2ecc71; --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5; --blue-fiance: #3498db;     
            --yellow-gold: #FFC107; --dark-green: #1b5e20; --eval-orange: #e67e22; 
            --ctrl-blue: #2c3e50;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 500px; background: white; padding: 30px 15px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .logo-container { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px; }
        .logo-ratp { width: 130px; height: auto; } .logo-casa { width: 100px; height: auto; } 
        h1 { font-family: 'Montserrat', sans-serif; color: var(--ratp-green); font-size: 1.4rem; text-transform: uppercase; margin: 15px 0 5px 0; font-weight: 900; }
        .user-welcome { color: var(--ratp-blue); font-weight: 800; margin-top: 10px; display: none; font-size: 1rem; border-top: 2px solid #eee; padding-top: 10px; }
        
        .menu-grid { display: none; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .menu-card { padding: 22px; border-radius: 18px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; color: white; transition: 0.2s; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.85rem; }
        .card-auth { background: var(--ratp-blue); border-left: 10px solid #003d73; display: block; width: 100%; max-width: 400px; padding: 35px 20px; border-radius: 18px; color: white; text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        
        .card-presence { background: var(--blue-fiance); border-left: 10px solid #2980b9; }
        .card-terrain { background: var(--yellow-gold); border-left: 10px solid #f39c12; color: #2c3e50; }
        .card-daily { background: var(--ctrl-blue); border-left: 10px solid #1a252f; }
        .card-eval { background: var(--eval-orange); border-left: 10px solid #d35400; }
        .card-recap { background: var(--dark-green); border-left: 10px solid #0a3d0d; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 92%; max-width: 380px; border-radius: 20px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 5px; right: 15px; font-size: 2.2rem; cursor: pointer; }
        label { display: block; font-weight: 700; font-size: 0.7rem; margin: 12px 0 4px; color: #7f8c8d; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #f1f3f5; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        .question-box { background: #fdf2e9; padding: 10px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--eval-orange); }
        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-group label { text-transform: none; color: #333; font-size: 0.85rem; display: flex; align-items: center; }
        .radio-group input { width: auto; margin-right: 5px; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <img src="logo_ratp_dev_casa.png" alt="Logo RATP" class="logo-ratp">
        <img src="logo_casa_group.png" alt="Logo Casa" class="logo-casa">
    </div>
    <h1>GESTION TERRITOIRE</h1>
    <div id="userDisplay" class="user-welcome"></div>
</div>

<div id="authSection" class="card-auth" onclick="connexionMatricule()">ESPACE CHEF DE ZONE</div>

<div id="mainMenu" class="menu-grid">
    <div class="menu-card card-presence" onclick="openModal('modalPresence')">PRÉSENCE</div>
    <div class="menu-card card-terrain" onclick="openModal('modalTerrain')">CONTRÔLEUR DE RONDE</div>
    <div class="menu-card card-daily" onclick="openModal('modalDaily')">CONTRÔLE QUOTIDIEN</div>
    <div class="menu-card card-eval" onclick="openModal('modalEval')">CONNAISSANCE RÉSEAU</div>
    <div class="menu-card card-recap" onclick="openModal('modalRecap')">RÉCAPITULATIF DU JOUR</div>
</div>

<div id="modalEval" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalEval')">&times;</span>
    <div style="color:var(--eval-orange); font-weight:900; border-bottom:3px solid var(--eval-orange); margin-bottom:10px;">CONNAISSANCE RÉSEAU</div>
    
    <label>Date & Heure (24h)</label>
    <div style="display: flex; gap: 5px;">
        <input type="date" id="dateEval">
        <input type="time" id="heureEval">
    </div>

    <label>Nom de l'Agent</label>
    <input type="text" id="nomAgentEval" placeholder="Nom complet de l'agent">

    <label>Prestataire</label>
    <select id="prestataireEval"><option value="RDCA">RDCA</option><option value="G4S">G4S</option><option value="RMO">RMO</option></select>

    <label>Ligne & Station</label>
    <select class="sel-ligne" onchange="updateStations(this)"></select>
    <select class="sel-station" style="margin-top:5px;"></select>

    <div class="question-box">
        <label style="color:var(--eval-orange)">Q1: Gamme tarifaire, Terminus, correspondances</label>
        <div class="radio-group">
            <label><input type="radio" name="q1" value="Maîtrise"> Maîtrise</label>
            <label><input type="radio" name="q1" value="non Maîtrise"> non Maîtrise</label>
        </div>
    </div>

    <div class="question-box">
        <label style="color:var(--eval-orange)">Q2: Déplacement sur le réseau (2 questions)</label>
        <div class="radio-group">
            <label><input type="radio" name="q2" value="Maîtrise"> Maîtrise</label>
            <label><input type="radio" name="q2" value="non Maîtrise"> non Maîtrise</label>
        </div>
    </div>

    <label>Commentaire</label>
    <textarea id="commEval" rows="2" placeholder="Détails supplémentaires..."></textarea>

    <button class="btn-action" style="background:var(--eval-orange)" onclick="validerConnaissance()">VALIDER L'ÉVALUATION</button>
</div></div>

<div id="modalPresence" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalPresence')">&times;</span>
    <div style="color:var(--blue-fiance); font-weight:900; border-bottom:3px solid var(--blue-fiance); margin-bottom:10px;">PRÉSENCE</div>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"></select>
    <label>Station</label><select class="sel-station"></select>
    <button class="btn-action" style="background:var(--ratp-green)" onclick="validerGeneric(this, 'PRISE DE SERVICE', 'MIXTE')">PRISE DE SERVICE</button>
    <button class="btn-action" style="background:var(--ratp-red)" onclick="validerGeneric(this, 'FIN DE SERVICE', 'MATIN')">FIN DE SERVICE</button>
</div></div>

<div id="modalDaily" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalDaily')">&times;</span>
    <div style="color:var(--ctrl-blue); font-weight:900; border-bottom:3px solid var(--ctrl-blue); margin-bottom:10px;">CONTRÔLE QUOTIDIEN</div>
    <label>Heure du contrôle (24h)</label><input type="time" id="heureCtrl">
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"></select>
    <label>Station</label><select class="sel-station"></select>
    <label>Prestataire</label><select id="prestataireDaily"><option value="RDCA">RDCA</option><option value="G4S">G4S</option><option value="RMO">RMO</option></select>
    <label>Nom de l'agent</label><input type="text" id="nomAgentDaily">
    <button class="btn-action" style="background:var(--ratp-blue)" onclick="validerControleLibre()">ENVOYER LE RAPPORT</button>
</div></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFzNUINWDDMdQIx_JnBa-X6lIxSr0pZEpw-wZP2_fq6Jp6beQFDhkoVNkuSyP_BS1lDg/exec";
    const chefsData = {"1436":"Redouane Zaoui", "90":"Fouad MAHMAH", "72":"Zakia AMMARI", "760":"Monsif MARZOUK", "591":"Hassan MOUTTAQUINE", "85":"El mostafa ERRAHMOUNI", "86":"Youssef ABOUHILAL", "506":"Anass CHOUKRI", "447":"Rachid BAZZAZ", "185":"Aicha ESSAHMI", "274":"Youssef EZZAMANIDI", "1061":"Ayoub AQASBY", "84":"Mohamed FRIMAN", "74":"Ouissal NASSOUHE", "81":"Mohamed REGRAGUI", "173":"Taha NAJHI", "534":"Mohamed CHAGUE", "430":"Mohamed SADOK", "518":"Samir HOUD", "346":"Youness MAATOUS", "254":"Azddine GOUTE", "643":"Nourddine KARDANE", "1137":"Abdelilah HARIRI", "193":"Bader HAMDA", "712":"Abdelkader OUELDBA", "820":"Samir AKLIA", "262":"Zakaria LAHMITI", "411":"Elbouazzaoui ERRAKI", "147":"Hicham ZAHIDI", "91":"Mounsif FOUAD", "82":"Rachid EL HAFYANI", "422":"El Mehdi EL MISSIOUI", "1386":"Fahd CHAHTI", "687":"Amine MOUSSADAK", "355":"Mouhcin RACHDAOUI", "549":"Wadii LARHA", "708":"Ouahid LAYLI", "77":"Siham KASSEMI", "1063":"Aziz DOUMI", "654":"Abderrahman BECHTAOUI"};
    
    // Stations abrégées pour l'exemple, mais vous devez garder votre liste complète ici
    const stationsData = { "T1": { "Sidi Moumen Terminus": [33.5866,-7.5019], "Lissasfa Terminus": [33.5352,-7.6699] }, "T2": { "Sidi Bernoussi Terminus": [33.6101,-7.5098], "Ain Diab Plage Terminus": [33.5876,-7.6809] } };

    let loggedInUser = "";

    function connexionMatricule() {
        let inputPass = prompt("Mot de passe (RATPDEV_matricule) :");
        if (inputPass && inputPass.startsWith("RATPDEV_")) {
            let mat = inputPass.replace("RATPDEV_", "");
            if (chefsData[mat]) {
                loggedInUser = chefsData[mat];
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainMenu').style.display = 'grid';
                document.getElementById('userDisplay').innerHTML = "Chef de Zone : <b>" + loggedInUser + "</b>";
                document.getElementById('userDisplay').style.display = 'block';
                remplirLignes();
                return;
            }
        }
        alert("Accès refusé.");
    }

    function remplirLignes() {
        document.querySelectorAll('.sel-ligne').forEach(s => {
            s.innerHTML = '<option value="">-- Ligne --</option>';
            for (let l in stationsData) { s.innerHTML += `<option value="${l}">${l}</option>`; }
        });
    }

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Station --</option>';
        if(stationsData[el.value]) {
            Object.keys(stationsData[el.value]).forEach(st => { sSelect.innerHTML += `<option value="${st}">${st}</option>`; });
        }
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function close_m(id) { document.getElementById(id).style.display = 'none'; }

    // VALIDATION CONNAISSANCE RÉSEAU
    function validerConnaissance() {
        const d = document.getElementById('dateEval').value, h = document.getElementById('heureEval').value;
        const ag = document.getElementById('nomAgentEval').value, prest = document.getElementById('prestataireEval').value;
        const l = document.querySelector('#modalEval .sel-ligne').value, s = document.querySelector('#modalEval .sel-station').value;
        const q1 = document.querySelector('input[name="q1"]:checked')?.value;
        const q2 = document.querySelector('input[name="q2"]:checked')?.value;
        const obs = document.getElementById('commEval').value;

        if(!d || !h || !ag || !l || !s || !q1 || !q2) return alert("Veuillez remplir tous les champs !");

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            type: "CONNAISSANCE_RESEAU", chef: loggedInUser, date: d, heure: h, agent: ag, prestataire: prest, ligne: l, station: s, q1_gamme: q1, q2_deplacement: q2, commentaire: obs 
        })}).then(() => { alert("✅ ÉVALUATION ENREGISTRÉE"); close_m('modalEval'); });
    }

    // Gardez vos autres fonctions validerGeneric et validerControleLibre identiques...
</script>
</body>
</html>
