<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRITOIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4; --ratp-green: #2ecc71; --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5; --blue-fiance: #3498db;     
            --yellow-gold: #FFC107; --dark-green: #1b5e20; --eval-orange: #e67e22; 
            --ctrl-blue: #2c3e50;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* EN-TÊTE ÉLARGIE ET LOGOS PLUS VISIBLES */
        .header { 
            text-align: center; 
            margin-bottom: 25px; 
            width: 100%; 
            max-width: 500px; /* Plus large */
            background: white; 
            padding: 30px 15px; /* Plus d'espace haut/bas */
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.12); 
        }
        .logo-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
        }
        .logo-casa { width: 85px; height: auto; } /* Plus grand */
        .logo-ratp { width: 110px; height: auto; } /* Plus grand */
        
        .ratp-dev-text {
            font-family: 'Montserrat', sans-serif;
            color: var(--ratp-blue);
            font-weight: 900;
            font-size: 1.2rem;
            margin-top: -10px;
            margin-bottom: 15px;
        }

        h1 { 
            font-family: 'Montserrat', sans-serif; 
            color: #333; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            margin: 5px 0 0 0; 
            font-weight: 900; 
            letter-spacing: 1px;
        }
        .sub-title {
            color: var(--ratp-blue);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* GRILLE DE MENU */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .menu-card { padding: 22px; border-radius: 18px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; color: white; transition: 0.2s; border: none; }
        .menu-card:active { transform: scale(0.96); }
        
        .card-presence { background: var(--blue-fiance); border-left: 10px solid #2980b9; }
        .card-terrain { background: var(--yellow-gold); border-left: 10px solid #f39c12; color: #2c3e50; }
        .card-daily { background: var(--ctrl-blue); border-left: 10px solid #1a252f; }
        .card-eval { background: var(--eval-orange); border-left: 10px solid #d35400; }
        .card-history { background: var(--dark-green); border-left: 10px solid #0a3d0d; }

        .card-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 92%; max-width: 380px; border-radius: 20px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 5px; right: 15px; font-size: 2.2rem; cursor: pointer; color: #333; }
        
        label { display: block; font-weight: 700; font-size: 0.7rem; margin: 12px 0 4px; color: #7f8c8d; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #f1f3f5; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        
        .ecarts-grid { display: grid; grid-template-columns: 1fr; gap: 8px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .ecart-item { display: flex; align-items: center; font-size: 0.85rem; font-weight: 600; color: #2c3e50; }
        .ecart-item input { width: auto; margin-right: 15px; transform: scale(1.3); }

        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
        #status-bar { position: fixed; bottom: 0; width: 100%; background: white; text-align: center; padding: 8px; font-size: 0.65rem; font-weight: 700; border-top: 1px solid #eee; color: #777; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <img src="logo_casa_group.png" alt="Logo Casa" class="logo-casa">
        <img src="logo_ratp_dev_casa.png" alt="Logo RATP" class="logo-ratp">
    </div>
    <div class="ratp-dev-text">RATP DEV</div>
    <h1>GESTION TERRITOIRE</h1>
    <div class="sub-title">CHEF DE ZONE</div>
</div>

<div class="menu-grid">
    <div class="menu-card card-presence" onclick="openModal('modalPresence')"><span class="card-title">PRÉSENCE</span></div>
    <div class="menu-card card-terrain" onclick="openModal('modalTerrain')"><span class="card-title">TAGUER STATION</span></div>
    <div class="menu-card card-daily" onclick="openModal('modalDaily')"><span class="card-title">CONTRÔLE QUOTIDIEN</span></div>
    <div class="menu-card card-eval" onclick="openModal('modalEval')"><span class="card-title">CONNAISSANCE RÉSEAU</span></div>
    <div class="menu-card card-history" onclick="checkPassword()"><span class="card-title">HISTORIQUE</span></div>
</div>

<div id="modalDaily" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalDaily')">&times;</span>
    <div style="color:var(--ctrl-blue); font-weight:900; margin-bottom:15px; border-bottom: 3px solid var(--ctrl-blue); padding-bottom:5px;">RAPPORT CONTRÔLE (F2)</div>
    
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <label>Prestataire</label><select id="prestataire"><option value="">-- Sélectionner --</option><option value="RDCA">RDCA</option><option value="G4S">G4S</option><option value="RMO">RMO</option></select>
    <label>Nom de l'agent</label><input type="text" id="nomAgent" placeholder="Prénom Nom...">

    <label>Écarts constatés</label>
    <div class="ecarts-grid" id="ecartsList">
        <label class="ecart-item"><input type="checkbox" value="Rassemblement"> Rassemblement</label>
        <label class="ecart-item"><input type="checkbox" value="Utilisation du téléphone"> Utilisation du téléphone</label>
        <label class="ecart-item"><input type="checkbox" value="Manque d'intervention F1/F2"> Manque d'intervention F1/F2</label>
        <label class="ecart-item"><input type="checkbox" value="Ne porte pas la tenue"> Ne porte pas la tenue</label>
        <label class="ecart-item"><input type="checkbox" value="Abondement"> Abondement</label>
        <label class="ecart-item"><input type="checkbox" value="Manque d'escorte Tram/Bus"> Manque d'escorte Tram/Bus</label>
    </div>

    <label>Observations complémentaires</label><textarea id="commCtrl" rows="3" placeholder="Notes..."></textarea>
    <button class="btn-action" style="background:var(--ratp-blue)" onclick="validerControleLibre()">ENVOYER LE RAPPORT</button>
</div></div>

<div id="modalEval" class="modal"><div class="modal-content" style="height:85vh; max-width:95%;">
    <span class="close-btn" onclick="closeModal('modalEval')">&times;</span>
    <iframe src="https://forms.cloud.microsoft/e/7WAqMpwsJJ" style="width:100%;height:100%;border:none;"></iframe>
</div></div>

<div id="modalPresence" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalPresence')">&times;</span>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action" style="background:var(--ratp-green)" onclick="validerGeneric(this, 'PRISE DE SERVICE', 'Mixte')">PRISE DE SERVICE</button>
    <button class="btn-action" style="background:var(--ratp-red)" onclick="validerGeneric(this, 'FIN DE SERVICE', 'Matin')">FIN DE SERVICE</button>
</div></div>

<div id="modalTerrain" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalTerrain')">&times;</span>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action" style="background:var(--ctrl-blue)" onclick="validerGeneric(this, 'TAGUER', 'N/A')">TAGUER STATION</button>
</div></div>

<div id="status-bar">GÉOLOCALISATION ACTIVE</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFzNUINWDDMdQIx_JnBa-X6lIxSr0pZEpw-wZP2_fq6Jp6beQFDhkoVNkuSyP_BS1lDg/exec"; 

    const chefs = ["Redouane Zaoui", "Fouad MAHMAH", "Zakia AMMARI", "Monsif MARZOUK", "Hassan MOUTTAQUINE", "El mostafa ERRAHMOUNI", "Youssef ABOUHILAL", "Anass CHOUKRI", "Rachid BAZZAZ", "Aicha ESSAHMI", "Youssef EZZAMANIDI", "Ayoub AQASBY", "Mohamed FRIMAN", "Ouissal NASSOUHE", "Mohamed REGRAGUI", "Taha NAJHI", "Mohamed CHAGUE", "Mohamed SADOK", "Samir HOUD", "Youness MAATOUS", "Azddine GOUTE", "Nourddine KARDANE", "Abdelilah HARIRI", "Bader HAMDA", "Abdelkader OUELDBA", "Samir HARIRI", "Samir AKLIA", "Zakaria LAHMITI", "Elbouazzaoui ERRAKI", "Hicham ZAHIDI", "Mounsif FOUAD", "Rachid EL HAFYANI", "El Mehdi EL MISSIOUI", "Fahd CHAHTI", "Amine MOUSSADAK", "Mouhcin RACHDAOUI", "Wadii LARHA", "Ouahid LAYLI", "Siham KASSEMI", "Aziz DOUMI", "Abderrahman BECHTAOUI"];
    
    const stationsData = {
        "T1": { "Sidi Moumen Terminus": [33.5866,-7.5019], "Ennassim": [33.5846,-7.5047], "Mohammed Zefzaf": [33.5821,-7.5090], "Hôpital Sidi Moumen": [33.5764,-7.5179], "Okba Ibn Nafii": [33.5730,-7.5328], "Place Al Yassir": [33.5928,-7.5966], "Place des Nations Unies": [33.5948,-7.6181], "Lissasfa Terminus": [33.5352,-7.6699] },
        "T2": { "Sidi Bernoussi Terminus": [33.6101,-7.5098], "Ain Diab Plage": [33.5876,-7.6809], "2 Mars": [33.5690,-7.6125], "Derb Sultan": [33.5720,-7.5959] },
        "T3": { "Hay Al Wahda Terminus": [33.5457,-7.5473], "Casa Port Terminus": [33.5979,-7.6109], "Garage Allal": [33.5756,-7.5989] },
        "T4": { "Mohammed Erradi Terminus": [33.5691,-7.5179], "Parc de la ligue arabe": [33.5879,-7.6217] },
        "BW1": { "Salmia 2 Terminus": [33.5371,-7.5508], "Omar El Khayam": [33.5402,-7.6669] },
        "BW2": { "Ouled Azzouz Terminus": [33.5185,-7.7576], "Oulmes Terminus": [33.5715,-7.6486] }
    };

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = function() {
        document.querySelectorAll('.sel-chef').forEach(s => { chefs.sort().forEach(c => { let o = document.createElement('option'); o.value = o.text = c; s.appendChild(o); }); });
        document.querySelectorAll('.sel-ligne').forEach(s => { for (let l in stationsData) { let o = document.createElement('option'); o.value = o.text = l; s.appendChild(o); } });
    };

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Sélectionner --</option>';
        if(stationsData[el.value]) { Object.keys(stationsData[el.value]).forEach(st => { let o = document.createElement('option'); o.value = st; o.text = st; sSelect.appendChild(o); }); }
    }

    function validerControleLibre() {
        const m = document.getElementById('modalDaily');
        const chef = m.querySelector('.sel-chef').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        const prest = document.getElementById('prestataire').value, agent = document.getElementById('nomAgent').value, comm = document.getElementById('commCtrl').value;
        let ecarts = [];
        document.querySelectorAll('#ecartsList input:checked').forEach(i => ecarts.push(i.value));

        if(!chef || !ligne || !station || !prest || !agent) return alert("Remplir tous les champs.");

        const mtn = new Date();
        const dateHeure = mtn.toLocaleDateString('fr-FR') + " " + mtn.toLocaleTimeString('fr-FR');

        navigator.geolocation.getCurrentPosition((pos) => {
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ 
                    type: "CONTROLE QUOTIDIEN", destination: "Feuille 2",
                    date_form: dateHeure, chef, ligne, station, prestataire: prest, agent, ecarts: ecarts.join(', '), commentaire: comm, gps: pos.coords.latitude+","+pos.coords.longitude 
                })
            }).then(() => { alert("✅ RAPPORT ENVOYÉ À " + dateHeure); closeModal('modalDaily'); });
        });
    }

    function validerGeneric(btn, action, serviceAuto) {
        const m = btn.closest('.modal-content');
        const chef = m.querySelector('.sel-chef').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        if(!chef || !ligne || !station) return alert("Champs obligatoires !");
        
        navigator.geolocation.getCurrentPosition((pos) => {
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ 
                    type: action, destination: "Feuille 1", chef, service: serviceAuto, ligne, station, gps: pos.coords.latitude+","+pos.coords.longitude 
                })
            }).then(() => { alert("✅ ENREGISTRÉ"); closeModal(btn.closest('.modal').id); });
        });
    }

    function checkPassword() { 
        if (prompt("Mot de passe requis pour l'historique :") === "1234") { 
            window.open("https://docs.google.com/spreadsheets/d/1_TNVG7NIdZ-vWqA_v8E4WbLhG7-l8mR6-Yp1E6s-4Xw", "_blank"); 
        } else {
            alert("Accès refusé.");
        }
    }
</script>
</body>
</html>
