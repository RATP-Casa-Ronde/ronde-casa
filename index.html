<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRETOIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4; --ratp-green: #2ecc71; --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5; --blue-fiance: #3498db;     
            --yellow-gold: #FFC107; --dark-green: #1b5e20; --eval-orange: #e67e22; 
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 400px; background: white; padding: 20px 0; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo-casa { width: 80px; } .logo-ratp { width: 100px; }
        h1 { font-family: 'Montserrat', sans-serif; color: var(--ratp-blue); font-size: 1.1rem; text-transform: uppercase; margin: 10px 0 5px; letter-spacing: 2px; font-weight: 900; }
        .sub-title { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; color: #7f8c8d; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .menu-card { padding: 35px 20px; border-radius: 24px; text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.15); cursor: pointer; transition: all 0.3s ease; border: 2px solid rgba(255,255,255,0.2); }
        .card-presence { background: var(--blue-fiance); border-left: 15px solid #2980b9; }
        .card-controleur { background: var(--yellow-gold); border-left: 15px solid #f39c12; }
        .card-eval { background: var(--eval-orange); border-left: 15px solid #d35400; }
        .card-history { background: var(--dark-green); border-left: 15px solid #0a3d0d; }
        .card-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1rem; color: white; text-transform: uppercase; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .card-controleur .card-title { color: #2c3e50; text-shadow: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.9); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 92%; max-width: 380px; border-radius: 30px; padding: 25px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 2.5rem; color: #333; cursor: pointer; }
        label { display: block; font-weight: 700; font-size: 0.75rem; margin: 15px 0 6px; color: #7f8c8d; text-transform: uppercase; }
        select { width: 100%; padding: 14px; border: 2px solid #f1f3f5; border-radius: 12px; font-size: 0.95rem; font-weight: 600; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 15px; color: white; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
        .btn-tag { background: #2c3e50; }
        .btn-prise { background: var(--ratp-green); }
        .btn-fin { background: var(--ratp-red); }
        #status-bar { position: fixed; bottom: 0; width: 100%; background: white; color: #7f8c8d; text-align: center; padding: 10px; font-size: 0.7rem; font-weight: 700; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <img src="logo_casa_group.png" alt="Logo" class="logo-casa"><br>
    <img src="logo_ratp_dev_casa.png" alt="Logo" class="logo-ratp">
    <h1>GESTION TERRETOIRE</h1>
    <div class="sub-title">Chef de zone</div>
</div>

<div class="menu-grid">
    <div class="menu-card card-presence" onclick="openModal('modalPresence')"><span class="card-title">PRÉSENCE</span></div>
    <div class="menu-card card-controleur" onclick="openModal('modalTerrain')"><span class="card-title">CONTRÔLEUR DE RONDE</span></div>
    <div class="menu-card card-eval" onclick="openModal('modalEval')"><span class="card-title">CONNAISSANCE DU RÉSEAU</span></div>
    <div class="menu-card card-history" onclick="checkPassword()"><span class="card-title">HISTORIQUE</span></div>
</div>

<div id="modalPresence" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalPresence')">&times;</span>
    <div style="color:var(--ratp-blue); font-weight:900; margin-bottom:10px;">PRÉSENCE</div>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Service</label><select class="sel-service"><option value="">-- Choisir --</option><option value="Matin">Matin</option><option value="Mixte">Mixte</option></select>
    <label>Ligne / Dépôt</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station / Lieu</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action btn-prise" onclick="validerTout(this, 'PRISE DE SERVICE')">PRISE DE SERVICE</button>
    <button class="btn-action btn-fin" onclick="validerTout(this, 'FIN DE SERVICE')">FIN DE SERVICE</button>
</div></div>

<div id="modalTerrain" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalTerrain')">&times;</span>
    <div style="color:var(--ratp-blue); font-weight:900; margin-bottom:10px;">CONTRÔLEUR DE RONDE</div>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne / Réseau</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station / Lieu</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action btn-tag" onclick="validerTout(this, 'TAGUER')">ACTIVER LE TAGUE</button>
</div></div>

<div id="modalEval" class="modal"><div class="modal-content" style="height:80vh; max-width:95%;"><span class="close-btn" onclick="closeModal('modalEval')">&times;</span><iframe src="https://forms.cloud.microsoft/e/7WAqMpwsJJ" style="width:100%;height:100%;border:none;"></iframe></div></div>
<div id="modalHistory" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeModal('modalHistory')">&times;</span><div id="history-list"></div></div></div>

<div id="status-bar">CONNECTÉ</div>

    };

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = function() {
        document.querySelectorAll('.sel-chef').forEach(s => { chefs.sort().forEach(c => { let o = document.createElement('option'); o.value = o.text = c; s.appendChild(o); }); });
        document.querySelectorAll('.sel-ligne').forEach(s => { for (let l in stationsData) { let o = document.createElement('option'); o.value = o.text = l; s.appendChild(o); } });
    };

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Sélectionner --</option>';
        if(stationsData[el.value]) { Object.keys(stationsData[el.value]).forEach(st => { let o = document.createElement('option'); o.value = st; o.text = st; sSelect.appendChild(o); }); }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function validerTout(btn, typeAction) {
        const m = btn.closest('.modal-content');
        const chef = m.querySelector('.sel-chef').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        const service = m.querySelector('.sel-service') ? m.querySelector('.sel-service').value : "N/A";

        if(!chef || !ligne || !station) return alert("Veuillez remplir tous les champs.");

        document.getElementById('status-bar').innerText = "📍 VÉRIFICATION POSITION...";
        
        navigator.geolocation.getCurrentPosition((pos) => {
            const uLat = pos.coords.latitude, uLon = pos.coords.longitude;
            const sCoords = stationsData[ligne][station];
            const dist = calculateDistance(uLat, uLon, sCoords[0], sCoords[1]);

            if (dist <= 80) {
                fetch("https://script.google.com/macros/s/AKfycbwteA6ZOpZPUA_-T7QkYqIRUVH3_t4EDCmAlRpemSUEfrs0EtYJtrrYy7JUQA-ARP-NpQ/exec", {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ type: typeAction, chef, service, ligne, station, gps: uLat+","+uLon, distance: Math.round(dist)+"m" })
                }).then(() => {
                    let logs = JSON.parse(localStorage.getItem('ronde_logs') || '[]');
                    logs.unshift({ type: typeAction, station, date: new Date().toLocaleString() });
                    localStorage.setItem('ronde_logs', JSON.stringify(logs.slice(0,10)));
                    alert("✅ TRANSMIS ! (" + Math.round(dist) + "m)");
                    closeModal(btn.closest('.modal').id);
                    document.getElementById('status-bar').innerText = "✅ PRÊT";
                });
            } else {
                alert("❌ REFUSÉ : TROP LOIN (" + Math.round(dist) + "m)\nVous devez être à moins de 80m de la station.");
                document.getElementById('status-bar').innerText = "❌ TROP LOIN";
            }
        }, () => alert("GPS REQUIS"), {enableHighAccuracy: true});
    }

    function checkPassword() {
        let p = prompt("Code :");
        if (p === PASSWORD_ADMIN) {
            const list = document.getElementById('history-list');
            const data = JSON.parse(localStorage.getItem('ronde_logs') || '[]');
            list.innerHTML = data.length === 0 ? "Vide." : data.map(i => `<div style="border-bottom:1px solid #eee; padding:10px 0;"><small>${i.date}</small><br><b>${i.type}</b> - ${i.station}</div>`).join('');
            openModal('modalHistory');
        }
    }
</script>
</body>
</html>
