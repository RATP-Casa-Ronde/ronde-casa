<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRITOIRE</title>
    <style>
        :root {
            --ratp-blue: #0055A4;
            --ratp-green: #28a745;
            --ratp-red: #dc3545;
            --dark-blue: #1a2a3a;
            --bg-gray: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-gray);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 400px; }
        .logo-casa { width: 110px; margin-bottom: 5px; }
        .logo-ratp { width: 120px; }
        h1 { color: var(--ratp-blue); font-size: 1.1rem; text-transform: uppercase; margin-top: 15px; font-weight: 800; }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 400px; }

        .menu-card {
            background: white; padding: 30px 20px; border-radius: 20px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            cursor: pointer; transition: 0.2s; border-bottom: 5px solid transparent;
        }
        .menu-card:active { transform: scale(0.95); }
        .card-presence { border-color: var(--ratp-blue); }
        .card-terrain { border-color: var(--dark-blue); }

        .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .card-title { font-weight: bold; font-size: 1.1rem; color: #333; text-transform: uppercase; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: white; width: 90%; max-width: 380px; border-radius: 20px;
            padding: 20px; position: relative; animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; color: #999; cursor: pointer; }
        .modal-h2 { color: var(--ratp-blue); font-size: 1rem; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; text-transform: uppercase; }

        label { display: block; font-weight: bold; font-size: 0.8rem; margin: 12px 0 5px; color: #444; }
        select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 0.95rem; background: #f9f9f9; margin-bottom: 5px;
        }

        .btn-action {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            color: white; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 20px;
            letter-spacing: 1px;
        }

        .btn-tag { background: var(--ratp-blue); box-shadow: 0 4px 10px rgba(0,85,164,0.3); }
        .btn-prise { background: var(--ratp-green); margin-bottom: 10px; font-size: 0.9rem; }
        .btn-fin { background: var(--ratp-red); font-size: 0.9rem; }

        #status-bar {
            position: fixed; bottom: 0; width: 100%; background: #222; color: white;
            text-align: center; padding: 12px; font-size: 0.8rem; font-weight: bold; z-index: 2000;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo_casa_group.png" alt="Logo" class="logo-casa"><br>
    <img src="logo_ratp_dev_casa.png" alt="Logo" class="logo-ratp">
    <h1>GESTION TERRITOIRE</h1>
</div>

<div class="menu-grid">
    <div class="menu-card card-presence" onclick="openModal('modalPresence')">
        <span class="icon">👤</span>
        <span class="card-title">Présence Agent</span>
    </div>

    <div class="menu-card card-terrain" onclick="openModal('modalTerrain')">
        <span class="icon">📍</span>
        <span class="card-title">Pointage Terrain</span>
    </div>
</div>

<div id="modalPresence" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('modalPresence')">&times;</span>
        <div class="modal-h2">Présence Agent</div>
        
        <label>Chef de Zone</label>
        <select class="sel-chef"><option value="">-- Sélectionner --</option></select>
        
        <label>Service</label>
        <select class="sel-service">
            <option value="">-- Choisir --</option>
            <option value="Matin">Matin</option>
            <option value="Mixte">Mixte</option>
        </select>

        <label>Ligne / Dépôt</label>
        <select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>

        <label>Lieu</label>
        <select class="sel-station"><option value="">-- Sélectionner --</option></select>

        <button class="btn-action btn-prise" onclick="valider(this, 'PRISE DE SERVICE')">PRISE DE SERVICE</button>
        <button class="btn-action btn-fin" onclick="valider(this, 'FIN DE SERVICE')">FIN DE SERVICE</button>
    </div>
</div>

<div id="modalTerrain" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('modalTerrain')">&times;</span>
        <div class="modal-h2">Pointage Terrain</div>

        <label>Chef de Zone</label>
        <select class="sel-chef"><option value="">-- Sélectionner --</option></select>

        <label>Service</label>
        <select class="sel-service">
            <option value="">-- Choisir --</option>
            <option value="Matin">Matin</option>
            <option value="Mixte">Mixte</option>
        </select>

        <label>Ligne / Réseau</label>
        <select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>

        <label>Station / Lieu</label>
        <select class="sel-station"><option value="">-- Sélectionner --</option></select>

        <button class="btn-action btn-tag" onclick="valider(this, 'TAGUER')">TAGUER</button>
    </div>
</div>

<div id="status-bar">Prêt</div>

<script>
    // --- DONNÉES ---
    const coordsGPS = { "Sidi Moumen Terminus": [33.586647, -7.501958], "Ennassim": [33.584639, -7.504737], "Mohammed Zefzaf": [33.582128, -7.509011], "Centre de Maintenance": [33.579344, -7.513379], "Hôpital Sidi Moumen": [33.576404, -7.517978], "Attacharouk": [33.574052, -7.524465], "Okba Ibn Nafii": [33.573007, -7.532854], "Forces Auxiliaires": [33.574800, -7.539628], "Hay Raja": [33.576612, -7.548226], "Ibn Tachfine": [33.580715, -7.562997], "Hay Mohammadi": [33.585144, -7.566664], "Achouhada": [33.588742, -7.567820], "Ali Yaata": [33.591476, -7.569933], "Grande Ceinture": [33.590609, -7.572976], "Anciens Abattoirs": [33.591181, -7.579402], "Bahmad": [33.594080, -7.587257], "Casa Voyageurs": [33.590620, -7.592358], "Place Al Yassir": [33.592837, -7.596692], "La Résistance": [33.593433, -7.602797], "Mohamed Diouri": [33.593613, -7.607416], "Marché Central": [33.594459, -7.612105], "Place des Nations Unies": [33.594889, -7.618149], "Place Mohammed V": [33.589746, -7.619919], "Avenue Hassan II": [33.584151, -7.623075], "Les Hôpitaux": [33.579969, -7.624865], "Faculté de Médecine": [33.574639, -7.625807], "Abdelmoumen": [33.570892, -7.625970], "Bachkou": [33.564119, -7.627425], "Mekka": [33.558359, -7.629648], "Gare Oasis": [33.554970, -7.631016], "Panoramique": [33.547339, -7.631964], "Technopark": [33.544749, -7.638060], "Zenith": [33.540917, -7.643435], "Gare Casa Sud": [33.542217, -7.651100], "Facultés": [33.545730, -7.657610], "Laymoune": [33.540164, -7.666361], "Lissasfa Terminus": [33.535258, -7.669981], "Sidi Bernoussi Terminus": [33.610125, -7.509822], "Abi Dar El Ghafari": [33.606614, -7.518053], "Gare De Ain Sbaa": [33.607444, -7.524403], "Préfecture Ain Sbaa": [33.602133, -7.530003], "Al Amane": [33.599183, -7.532944], "Al wifaq": [33.595686, -7.538122], "Dar Laman": [33.593836, -7.557414], "Carrières Centrales": [33.592719, -7.564481], "Kissariat Hay Mohammadi": [33.587125, -7.563622], "Mdakra": [33.581275, -7.563372], "Hay Adil": [33.579272, -7.568178], "Derb Milan": [33.572050, -7.580811], "Hay El Farah": [33.571639, -7.586414], "Derb Sultan": [33.572092, -7.595917], "Place Sraghna": [33.569625, -7.602231], "El Fida": [33.566475, -7.607325], "2 Mars": [33.569097, -7.612592], "Hermitage": [33.569186, -7.617908], "Anoual": [33.569419, -7.625025], "Derb Ghalef": [33.570059, -7.631693], "Riviera": [33.570943, -7.636231], "Ghandi": [33.568550, -7.644920], "Beauséjour": [33.564245, -7.648021], "Anfa Clubs": [33.561018, -7.653188], "Anfa Park": [33.559831, -7.657648], "Place Financière": [33.562307, -7.660902], "Abdellah Ben Cherif": [33.565833, -7.660272], "Cité De L'air": [33.568323, -7.664376], "Sidi Abderrahmane": [33.572274, -7.669556], "Hay Hassani": [33.576567, -7.672932], "Littoral": [33.580927, -7.674802], "Ain Diab Plage Terminus": [33.587608, -7.680950] };
    const structureData = { "Dépôts": ["Dépôt Hantat", "Dépôt Sidi Moumen", "Dépôt CDR", "Dépôt Sidi Bernoussi"], "Lignes": ["T1", "T2", "T3", "T4", "BW1", "BW2"] };
    const stationsData = { 
        "Dépôt Hantat": ["Loge", "Atelier", "Bureaux"], "Dépôt Sidi Moumen": ["Loge", "Atelier", "PCC"], "Dépôt CDR": ["Loge", "Atelier"], "Dépôt Sidi Bernoussi": ["Loge", "Atelier"],
        "T1": ["Sidi Moumen Terminus", "Ennassim", "Mohammed Zefzaf", "Centre de Maintenance", "Hôpital Sidi Moumen", "Attacharouk", "Okba Ibn Nafii", "Forces Auxiliaires", "Hay Raja", "Ibn Tachfine", "Hay Mohammadi", "Achouhada", "Ali Yaata", "Grande Ceinture", "Anciens Abattoirs", "Bahmad", "Casa Voyageurs", "Place Al Yassir", "La Résistance", "Mohamed Diouri", "Marché Central", "Place des Nations Unies", "Place Mohammed V", "Avenue Hassan II", "Les Hôpitaux", "Faculté de Médecine", "Abdelmoumen", "Bachkou", "Mekka", "Gare Oasis", "Panoramique", "Technopark", "Zenith", "Gare Casa Sud", "Facultés", "Laymoune", "Lissasfa Terminus"],
        "T2": ["Sidi Bernoussi Terminus", "Abi Dar El Ghafari", "Gare De Ain Sbaa", "Préfecture Ain Sbaa", "Al Amane", "Al wifaq", "Dar Laman", "Carrières Centrales", "Kissariat Hay Mohammadi", "Mdakra", "Hay Adil", "Derb Milan", "Hay El Farah", "Derb Sultan", "Place Sraghna", "El Fida", "2 Mars", "Hermitage", "Anoual", "Derb Ghalef", "Riviera", "Ghandi", "Beauséjour", "Anfa Clubs", "Anfa Park", "Place Financière", "Abdellah Ben Cherif", "Cité De L'air", "Sidi Abderrahmane", "Hay Hassani", "Littoral", "Ain Diab Plage Terminus"]
    };
    const chefs = ["Redouane Zaoui", "Fouad MAHMAH", "Zakia AMMARI", "Monsif MARZOUK", "Hassan MOUTTAQUINE", "El mostafa ERRAHMOUNI", "Youssef ABOUHILAL", "Anass CHOUKRI", "Rachid BAZZAZ", "Aicha ESSAHMI", "Youssef EZZAMANIDI", "Ayoub AQASBY", "Mohamed FRIMAN", "Ouissal NASSOUHE", "Mohamed REGRAGUI", "Taha NAJHI", "Mohamed CHAGUE", "Mohamed SADOK", "Samir HOUD", "Youness MAATOUS", "Azddine GOUTE", "Nourddine KARDANE", "Abdelilah HARIRI", "Bader HAMDA", "Abdelkader OUELDBA", "Samir HARIRI", "Samir AKLIA", "Zakaria LAHMITI", "Elbouazzaoui ERRAKI", "Hicham ZAHIDI", "Mounsif FOUAD", "Rachid EL HAFYANI", "El Mehdi EL MISSIOUI", "Fahd CHAHTI", "Amine MOUSSADAK", "Mouhcin RACHDAOUI", "Wadii LARHA", "Ouahid LAYLI", "Siham KASSEMI", "Aziz DOUMI", "Abderrahman BECHTAOUI"];

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = function() {
        document.querySelectorAll('.sel-chef').forEach(s => {
            chefs.sort().forEach(c => { let o = document.createElement('option'); o.value = o.text = c; s.appendChild(o); });
        });
        document.querySelectorAll('.sel-ligne').forEach(s => {
            for (let cat in structureData) {
                let g = document.createElement('optgroup'); g.label = cat;
                structureData[cat].forEach(l => { let o = document.createElement('option'); o.value = o.text = l; g.appendChild(o); });
                s.appendChild(g);
            }
        });
    };

    function updateStations(el) {
        const modal = el.closest('.modal-content');
        const sSelect = modal.querySelector('.sel-station');
        const l = el.value;
        sSelect.innerHTML = '<option value="">-- Sélectionner --</option>';
        if (l && stationsData[l]) { stationsData[l].forEach(st => { let o = document.createElement('option'); o.value = o.text = st; sSelect.appendChild(o); }); }
    }

    function valider(btn, type) {
        const modal = btn.closest('.modal-content');
        const chef = modal.querySelector('.sel-chef').value;
        const service = modal.querySelector('.sel-service').value;
        const ligne = modal.querySelector('.sel-ligne').value;
        const station = modal.querySelector('.sel-station').value;
        const bar = document.getElementById('status-bar');

        if(!chef || !service || !ligne || !station) { alert("⚠️ Formulaire incomplet !"); return; }

        bar.innerHTML = "🛰️ GPS..."; bar.style.background = "orange";
        navigator.geolocation.getCurrentPosition((pos) => {
            const uLat = pos.coords.latitude; const uLon = pos.coords.longitude;
            
            if(type === 'TAGUER' && !ligne.startsWith("Dépôt")) {
                const target = coordsGPS[station];
                if(target) {
                    const dist = 6371000 * 2 * Math.atan2(Math.sqrt(Math.sin((target[0]-uLat)*Math.PI/360)**2 + Math.cos(uLat*Math.PI/180)*Math.cos(target[0]*Math.PI/180)*Math.sin((target[1]-uLon)*Math.PI/360)**2), Math.sqrt(1-(Math.sin((target[0]-uLat)*Math.PI/360)**2 + Math.cos(uLat*Math.PI/180)*Math.cos(target[0]*Math.PI/180)*Math.sin((target[1]-uLon)*Math.PI/360)**2)));
                    if(dist > 80) { bar.innerHTML = "❌ Trop loin !"; bar.style.background = "red"; alert("❌ Trop loin ("+Math.round(dist)+"m)"); return; }
                }
            }

            bar.innerHTML = "⏳ Envoi...";
            fetch("https://script.google.com/macros/s/AKfycbwteA6ZOpZPUA_-T7QkYqIRUVH3_t4EDCmAlRpemSUEfrs0EtYJtrrYy7JUQA-ARP-NpQ/exec", {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ type: type, chef: chef, service: service, ligne: ligne, station: station, gps: uLat+","+uLon })
            }).then(() => {
                bar.innerHTML = "✅ ENREGISTRÉ"; bar.style.background = "#28a745";
                alert("✅ Enregistré avec succès !");
                closeModal(btn.closest('.modal').id);
            });
        }, () => alert("GPS requis"), {enableHighAccuracy:true});
    }
</script>
</body>
</html>
