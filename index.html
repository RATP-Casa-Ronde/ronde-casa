<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRITOIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4; --ratp-green: #2ecc71; --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5; --blue-fiance: #3498db;     
            --yellow-gold: #FFC107; --dark-green: #1b5e20; --eval-orange: #e67e22; 
            --ctrl-blue: #2c3e50;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 500px; background: white; padding: 30px 15px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .logo-container { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px; }
        .logo-ratp { width: 130px; height: auto; } 
        .logo-casa { width: 100px; height: auto; } 
        h1 { font-family: 'Montserrat', sans-serif; color: var(--ratp-blue); font-size: 1.3rem; text-transform: uppercase; margin: 15px 0 5px 0; font-weight: 900; }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .menu-card { padding: 22px; border-radius: 18px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; color: white; transition: 0.2s; border: none; }
        
        .card-presence { background: var(--blue-fiance); border-left: 10px solid #2980b9; }
        .card-terrain { background: var(--yellow-gold); border-left: 10px solid #f39c12; color: #2c3e50; }
        .card-daily { background: var(--ctrl-blue); border-left: 10px solid #1a252f; }
        .card-eval { background: var(--eval-orange); border-left: 10px solid #d35400; }
        .card-history { background: var(--dark-green); border-left: 10px solid #0a3d0d; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 92%; max-width: 380px; border-radius: 20px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 5px; right: 15px; font-size: 2.2rem; cursor: pointer; }
        
        label { display: block; font-weight: 700; font-size: 0.7rem; margin: 12px 0 4px; color: #7f8c8d; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #f1f3f5; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        
        /* STYLE POUR LES CHECKBOXES DES ÉCARTS */
        .ecarts-grid { display: grid; grid-template-columns: 1fr; gap: 8px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-top: 5px; }
        .ecart-item { display: flex; align-items: center; font-size: 0.85rem; font-weight: 600; color: #2c3e50; cursor: pointer; text-transform: none; }
        .ecart-item input { width: auto; margin-right: 12px; transform: scale(1.3); }

        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <img src="logo_ratp_dev_casa.png" alt="Logo RATP" class="logo-ratp">
        <img src="logo_casa_group.png" alt="Logo Casa" class="logo-casa">
    </div>
    <h1>GESTION TERRITOIRE</h1>
</div>

<div class="menu-grid">
    <div class="menu-card card-presence" onclick="openModal('modalPresence')">PRÉSENCE</div>
    <div class="menu-card card-terrain" onclick="openModal('modalTerrain')">CONTRÔLEUR DE RONDE</div>
    <div class="menu-card card-daily" onclick="openModal('modalDaily')">CONTRÔLE QUOTIDIEN</div>
    <div class="menu-card card-eval" onclick="openModal('modalEval')">CONNAISSANCE RÉSEAU</div>
    <div class="menu-card card-history" onclick="checkPassword()">HISTORIQUE</div>
</div>

<div id="modalDaily" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalDaily')">&times;</span>
    <div style="color:var(--ctrl-blue); font-weight:900; margin-bottom:15px; border-bottom: 3px solid var(--ctrl-blue); padding-bottom:5px;">RAPPORT CONTRÔLE (F2)</div>
    
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <label>Prestataire</label><select id="prestataire"><option value="">-- Sélectionner --</option><option value="RDCA">RDCA</option><option value="G4S">G4S</option><option value="RMO">RMO</option></select>
    <label>Nom de l'agent</label><input type="text" id="nomAgent" placeholder="Prénom Nom...">
    
    <label>Écarts constatés (Plusieurs choix possibles)</label>
    <div class="ecarts-grid" id="ecartsList">
        <label class="ecart-item"><input type="checkbox" value="Rassemblement"> Rassemblement</label>
        <label class="ecart-item"><input type="checkbox" value="Utilisation du téléphone"> Utilisation du téléphone</label>
        <label class="ecart-item"><input type="checkbox" value="Manque d'intervention F1/F2"> Manque d'intervention F1/F2</label>
        <label class="ecart-item"><input type="checkbox" value="Ne porte pas la tenue"> Ne porte pas la tenue</label>
        <label class="ecart-item"><input type="checkbox" value="Abondement"> Abondement</label>
        <label class="ecart-item"><input type="checkbox" value="Manque d'escorte Tram/Bus"> Manque d'escorte Tram/Bus</label>
    </div>

    <label>Observations</label><textarea id="commCtrl" rows="3" placeholder="Notes..."></textarea>
    <button class="btn-action" style="background:var(--ratp-blue)" onclick="validerControleLibre()">ENVOYER LE RAPPORT</button>
</div></div>

<div id="modalPresence" class="modal"><div class="modal-content"><span class="close-btn" onclick="close_m('modalPresence')">&times;</span>
    <label>Chef de Zone</label><select class="sel-chef"></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"></select>
    <label>Station</label><select class="sel-station"></select>
    <button class="btn-action" style="background:var(--ratp-green)" onclick="validerGeneric(this, 'PRISE DE SERVICE', 'MIXTE')">PRISE DE SERVICE</button>
</div></div>

<div id="modalTerrain" class="modal"><div class="modal-content"><span class="close-btn" onclick="close_m('modalTerrain')">&times;</span>
    <label>Chef de Zone</label><select class="sel-chef"></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"></select>
    <label>Station</label><select class="sel-station"></select>
    <button class="btn-action" style="background:var(--yellow-gold); color:#2c3e50" onclick="validerGeneric(this, 'TAGUER', 'N/A')">TAGUER STATION</button>
</div></div>

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function close_m(id) { document.getElementById(id).style.display = 'none'; }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    window.onload = function() {
        document.querySelectorAll('.sel-chef').forEach(s => { chefs.forEach(c => { let o = document.createElement('option'); o.value = o.text = c; s.appendChild(o); }); });
        document.querySelectorAll('.sel-ligne').forEach(s => { for (let l in stationsData) { let o = document.createElement('option'); o.value = o.text = l; s.appendChild(o); } });
    };

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Sélectionner --</option>';
        const l = el.value;
        if(stationsData[l]) { Object.keys(stationsData[l]).forEach(st => { let o = document.createElement('option'); o.value = o.text = st; sSelect.appendChild(o); }); }
    }

    function validerControleLibre() {
        const m = document.getElementById('modalDaily');
        const chef = m.querySelector('.sel-chef').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        const prest = document.getElementById('prestataire').value, agent = document.getElementById('nomAgent').value, comm = document.getElementById('commCtrl').value;
        
        // Récupération des écarts cochés
        let ec = []; document.querySelectorAll('#ecartsList input:checked').forEach(i => ec.push(i.value));

        if(!chef || !ligne || !station || !prest || !agent) return alert("Veuillez remplir tous les champs obligatoires.");
        
        const coordsS = stationsData[ligne][station];
        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = getDistance(pos.coords.latitude, pos.coords.longitude, coordsS[0], coordsS[1]);
            if(dist > 80) return alert(`⛔ ACCÈS REFUSÉ\nDistance : ${Math.round(dist)}m. Vous devez être à moins de 80m.`);

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
                type: "CONTROLE QUOTIDIEN", destination: "Feuille 2", chef, ligne, station, prestataire: prest, agent, ecarts: ec.join(', '), commentaire: comm, gps: pos.coords.latitude+","+pos.coords.longitude 
            })}).then(() => { alert("✅ RAPPORT ENVOYÉ"); close_m('modalDaily'); });
        });
    }

    function validerGeneric(btn, action, serv) {
        const m = btn.closest('.modal-content');
        const chef = m.querySelector('.sel-chef').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        if(!chef || !ligne || !station) return alert("Champs obligatoires !");
        
        const coordsS = stationsData[ligne][station];
        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = getDistance(pos.coords.latitude, pos.coords.longitude, coordsS[0], coordsS[1]);
            if(dist > 80) return alert(`⛔ ACCÈS REFUSÉ\nDistance : ${Math.round(dist)}m.`);
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: action, destination: "Feuille 1", chef, service: serv, ligne, station, gps: pos.coords.latitude+","+pos.coords.longitude })
            }).then(() => { alert("✅ ENREGISTRÉ"); close_m(btn.closest('.modal').id); });
        });
    }

    function checkPassword() { if (prompt("Mot de passe :") === "1234") { window.open("https://docs.google.com/spreadsheets/d/1_TNVG7NIdZ-vWqA_v8E4WbLhG7-l8mR6-Yp1E6s-4Xw", "_blank"); } }
</script>
</body>
</html>
