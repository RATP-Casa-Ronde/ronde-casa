    let lastLigne = "", lastStation = "", lastAgent = "", lastPres = "G4S", loggedInUser = "", db;

    // IndexedDB
    const dbReq = indexedDB.open("RondeCasaDB", 1);
    dbReq.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("rapports")) db.createObjectStore("rapports", { autoIncrement: true });
    };
    dbReq.onsuccess = (e) => { db = e.target.result; forceSync(); };

    function forceSync() {
        if (!navigator.onLine || !db) return;
        const store = db.transaction("rapports", "readwrite").objectStore("rapports");
        const all = store.getAll();
        all.onsuccess = () => {
            if (all.result.length > 0) {
                all.result.forEach(r => fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) }));
                db.transaction("rapports", "readwrite").objectStore("rapports").clear();
                alert("📶 Synchro réussie.");
            }
        };
    }

        const matInput = document.getElementById('loginMat').value;
        const passInput = document.getElementById('loginPass').value;
        if (matInput.startsWith("RATPDEV_")) {
            let mat = matInput.replace("RATPDEV_", "");
            if (chefsData[mat] && passInput.length >= 3) {
                loggedInUser = chefsData[mat];
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('mainMenu').style.display = 'grid';
                document.getElementById('userName').innerText = loggedInUser;
                remplirLignes();
                return;
            }
        }
        alert("Erreur d'authentification.");
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function close_m(id) { document.getElementById(id).style.display = 'none'; }

    function openAndPreFill(id) {
        openModal(id);
        const modal = document.getElementById(id);
        const timeInputs = modal.querySelectorAll('input[type="time"]');
        if(timeInputs) {
            const now = new Date().toTimeString().slice(0,5);
            timeInputs.forEach(ti => ti.value = now);
        }
        if(lastLigne) {
            const lSel = modal.querySelector('.sel-ligne');
            if(lSel) { lSel.value = lastLigne; updateStations(lSel); if(lastStation) modal.querySelector('.sel-station').value = lastStation; }
        }
        modal.querySelectorAll('.mem-agent').forEach(i => i.value = lastAgent);
        modal.querySelectorAll('.mem-pres').forEach(s => s.value = lastPres);
        if(id === 'modalTerrain') startTimerUpdate();
    }

    function remplirLignes() {
        document.querySelectorAll('.sel-ligne').forEach(s => {
            s.innerHTML = '<option value="">-- Ligne --</option>';
            for (let l in stationsData) s.innerHTML += `<option value="${l}">${l}</option>`;
        });
    }

    function updateStations(el) {
        lastLigne = el.value;
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Station --</option>';
        if(stationsData[el.value]) Object.keys(stationsData[el.value]).forEach(st => sSelect.innerHTML += `<option value="${st}">${st}</option>`);
        sSelect.onchange = (e) => { lastStation = e.target.value; updateRondeStatus(); };
        updateRondeStatus();
    }

    function updateRondeStatus() {
        const display = document.getElementById('timerDisplay');
        if (!display) return;
        if (!lastLigne || !lastStation) { display.innerText = ""; return; }
        const key = `arrivee_${lastLigne}_${lastStation}`;
        const t = localStorage.getItem(key);
        if (!t) { display.innerText = "Statut : Non arrivé"; display.style.color = "red"; }
        else {
            const diff = Math.floor((Date.now() - parseInt(t)) / 60000);
            if (diff < 15) { display.innerText = `⏳ Attente : ${15 - diff} min restantes`; display.style.color = "orange"; }
            else { display.innerText = "✅ Temps de présence (15 min) validé !"; display.style.color = "green"; }
        }
    }

    function startTimerUpdate() { setInterval(updateRondeStatus, 30000); }

    function validerRonde(mode) {
        if(!lastLigne || !lastStation) return alert("Sélectionnez Ligne/Station");
        navigator.geolocation.getCurrentPosition(pos => {
            const dist = getDistance(pos.coords.latitude, pos.coords.longitude, stationsData[lastLigne][lastStation][0], stationsData[lastLigne][lastStation][1]);
            if (dist > 80) return alert(`Trop loin (${Math.round(dist)}m)`);
            const key = `arrivee_${lastLigne}_${lastStation}`;
            if (mode === 'ARRIVEE') {
                localStorage.setItem(key, Date.now().toString());
                envoyerOuStocker({ type: "ARRIVÉE STATION", chef: loggedInUser, ligne: lastLigne, station: lastStation, gps: pos.coords.latitude+","+pos.coords.longitude }, 'modalTerrain');
            } else {
                const t = localStorage.getItem(key);
                if (!t) return alert("Taguez l'arrivée d'abord !");
                if ((Date.now() - parseInt(t)) / 60000 < 15) return alert("Erreur : Minimum 15 minutes requis.");
                envoyerOuStocker({ type: "DÉPART STATION", chef: loggedInUser, ligne: lastLigne, station: lastStation, gps: pos.coords.latitude+","+pos.coords.longitude }, 'modalTerrain');
                localStorage.removeItem(key);
            }
            updateRondeStatus();
        }, () => alert("GPS requis."));
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function envoyerOuStocker(data, modalId) {
        if (navigator.onLine) {
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
            .then(() => { alert("✅ TRANSMIS"); close_m(modalId); })
            .catch(() => stockerLocalement(data, modalId));
        } else stockerLocalement(data, modalId);
    }

    function stockerLocalement(data, modalId) {
        const store = db.transaction("rapports", "readwrite").objectStore("rapports");
        store.add(data); alert("⚠️ Sauvegardé localement (Hors-ligne)"); close_m(modalId);
    }

    // DISPOSITIF MIS À JOUR SANS CHAMP AGENT
    function validerF1F2() {
        const type = document.getElementById('typeF1F2').value;
        const hD = document.getElementById('hDebutF1F2').value;
        const hF = document.getElementById('hFinF1F2').value;

        if(!lastLigne || !lastStation || !hD || !hF) return alert("Veuillez remplir tous les champs.");
        
        envoyerOuStocker({ 
            type: "DISPOSITIF " + type, 
            chef: loggedInUser, 
            ligne: lastLigne, 
            station: lastStation,
            heureDebut: hD,
            heureFin: hF
        }, 'modalF1F2');
    }

    function validerControleLibre() {
        const h = document.getElementById('heureCtrl').value, ag = document.getElementById('nomAgentDaily').value, pr = document.getElementById('presDaily').value;
        if(!h || !lastLigne || !lastStation || !ag) return alert("Champs vides !");
        lastAgent = ag; lastPres = pr;
        const ec = Array.from(document.querySelectorAll('#groupEcarts input:checked')).map(b => b.value).join(', ');
        envoyerOuStocker({ type: "CONTROLE", chef: loggedInUser, heure: h, ligne: lastLigne, station: lastStation, agent: ag, prestataire: pr, ecarts: ec || "Aucun" }, 'modalDaily');
    }

    function validerConnaissance() {
        const ag = document.getElementById('nomAgentEval').value, pr = document.getElementById('presEval').value;
        if(!ag || !lastLigne || !lastStation) return alert("Champs vides !");
        lastAgent = ag; lastPres = pr;
        envoyerOuStocker({ type: "EVALUATION", chef: loggedInUser, agent: ag, prestataire: pr, ligne: lastLigne, station: lastStation, q1: document.getElementById('q1Eval').value, q2: document.getElementById('q2Eval').value }, 'modalEval');
    }

    function validerGeneric(btn, action, serv, checkGPS) {
        if(!lastLigne || !lastStation) return alert("Sélectionnez Ligne/Station");
        navigator.geolocation.getCurrentPosition(pos => {
            if (checkGPS) {
                const dist = getDistance(pos.coords.latitude, pos.coords.longitude, stationsData[lastLigne][lastStation][0], stationsData[lastLigne][lastStation][1]);
                if (dist > 80) return alert("Trop loin !");
            }
            envoyerOuStocker({ type: action, chef: loggedInUser, service: serv, ligne: lastLigne, station: lastStation, gps: pos.coords.latitude+","+pos.coords.longitude }, btn.closest('.modal').id);
        }, () => alert("GPS requis."));
    }
</script>
