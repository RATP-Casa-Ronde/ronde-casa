<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRITOIRE V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4; --ratp-green: #2ecc71; --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5; --blue-fiance: #3498db;     
            --yellow-gold: #FFC107; --dark-green: #1b5e20; --eval-orange: #e67e22; 
            --ctrl-blue: #2c3e50; --title-orange: #CC5500;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .nav-btn-int { padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; display: none; }
        .btn-logout { background: var(--ratp-red); color: white; }
        .btn-prev { background: var(--ctrl-blue); color: white; }
        .logo-container { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .logo-ratp { width: 110px; height: auto; } .logo-casa { width: 90px; height: auto; } 
        h1 { font-family: 'Montserrat', sans-serif; color: var(--title-orange); font-size: 1.3rem; text-transform: uppercase; margin: 10px 0; font-weight: 900; }
        .user-welcome { color: var(--ratp-blue); font-weight: 800; margin-top: 5px; font-size: 1rem; border-top: 1px solid #eee; padding-top: 10px; display: none;}
        .card-auth { background: var(--ratp-blue); border-left: 10px solid #003d73; width: 100%; max-width: 400px; padding: 30px 20px; border-radius: 18px; color: white; text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .sub-click { display: block; font-size: 0.75rem; color: var(--yellow-gold); font-weight: 400; margin-top: 8px; text-decoration: underline; }
        .menu-grid { display: none; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .menu-card { padding: 22px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; color: white; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.85rem; border: none; width: 100%; }
        .card-presence { background: var(--blue-fiance); border-bottom: 5px solid #2980b9; }
        .card-terrain { background: var(--yellow-gold); border-bottom: 5px solid #f39c12; color: #2c3e50; }
        .card-daily { background: var(--ctrl-blue); border-bottom: 5px solid #1a252f; }
        .card-eval { background: var(--eval-orange); border-bottom: 5px solid #d35400; }
        .card-recap { background: var(--dark-green); border-bottom: 5px solid #0a3d0d; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 92%; max-width: 380px; border-radius: 20px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 5px; right: 15px; font-size: 2.2rem; cursor: pointer; }
        label { display: block; font-weight: 700; font-size: 0.7rem; margin: 12px 0 4px; color: #7f8c8d; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #f1f3f5; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        .checkbox-group { display: grid; grid-template-columns: 1fr; gap: 8px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.85rem; font-weight: 600; }
        .checkbox-item input { width: 18px; height: 18px; margin-right: 10px; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-container">
        <button id="logoutBtn" class="nav-btn-int btn-logout" onclick="deconnexion()">Déconnecter</button>
        <button id="prevBtn" class="nav-btn-int btn-prev" onclick="retourArriere()">Précédent</button>
    </div>
    <div class="logo-container">
        <img src="logo_ratp_dev_casa.png" alt="Logo RATP" class="logo-ratp">
        <img src="logo_casa_group.png" alt="Logo Casa" class="logo-casa">
    </div>
    <h1>GESTION TERRITOIRE</h1>
    <div id="userDisplay" class="user-welcome"></div>
</div>

<div id="authSection" class="card-auth" onclick="connexionMatricule()">
    ESPACE CHEF DE ZONE
    <span class="sub-click">Cliquez pour se connecter</span>
</div>

<div id="mainMenu" class="menu-grid">
    <button class="menu-card card-presence" onclick="openModal('modalPresence')">PRÉSENCE</button>

    <button class="menu-card card-recap" onclick="openModal('modalRecap')">RÉCAPITULATIF DU JOUR</button>
</div>

<div id="modalDaily" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalDaily')">&times;</span>

    <label>Heure (24h)</label><input type="time" id="heureCtrl">

    <label>Prestataire</label>

    </div>
    <button class="btn-action" style="background:var(--ratp-blue)" onclick="validerControleLibre()">ENVOYER LE RAPPORT</button>
</div></div>

<div id="modalPresence" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalPresence')">&times;</span>

    <button class="btn-action" style="background:var(--ratp-red)" onclick="validerGeneric(this, 'FIN DE SERVICE', 'SERVICE MATIN', true)">FIN DE SERVICE (SERVICE MATIN)</button>

<div id="modalTerrain" class="modal"><div class="modal-content">

    let loggedInUser = "";

    function connexionMatricule() {
        let pass = prompt("Mot de passe (RATPDEV_matricule) :");
        if (pass && pass.startsWith("RATPDEV_")) {
            let mat = pass.replace("RATPDEV_", "");
            if (chefsData[mat]) {
                loggedInUser = chefsData[mat];
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainMenu').style.display = 'grid';

                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('prevBtn').style.display = 'block';
                remplirLignes();
                return;
            }
        }
        alert("Accès refusé.");
    }

    function deconnexion() { if(confirm("Déconnexion ?")) location.reload(); }
    function retourArriere() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function close_m(id) { document.getElementById(id).style.display = 'none'; }

    function remplirLignes() {
        document.querySelectorAll('.sel-ligne').forEach(s => {
            s.innerHTML = '<option value="">-- Ligne --</option>';
            for (let l in stationsData) { s.innerHTML += `<option value="${l}">${l}</option>`; }
        });
    }

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Station --</option>';
        if(stationsData[el.value]) {
            Object.keys(stationsData[el.value]).forEach(st => { sSelect.innerHTML += `<option value="${st}">${st}</option>`; });
        }
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function validerControleLibre() {
        const boxes = document.querySelectorAll('#groupEcarts input:checked');
        let ec = Array.from(boxes).map(b => b.value).join(', ');
        const h = document.getElementById('heureCtrl').value, l = document.querySelector('#modalDaily .sel-ligne').value, s = document.querySelector('#modalDaily .sel-station').value;
        const ag = document.getElementById('nomAgentDaily').value, pr = document.getElementById('presDaily').value;
        if(!h || !l || !s || !ag) return alert("Veuillez remplir tous les champs.");
        
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            type: "CONTROLE_QUOTIDIEN", targetSheet: "Feuille 2", chef: loggedInUser, heure: h, ligne: l, station: s, agent: ag, prestataire: pr, ecarts: ec || "Aucun" 
        })})
        .then(() => { alert("✅ RAPPORT ENVOYÉ"); close_m('modalDaily'); });
    }

    fetch(SCRIPT_URL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify({ 
            type: "CONNAISSANCE_RESEAU", 
            targetSheet: "Feuille 3", // <--- Nouvelle instruction
            chef: loggedInUser, 
            agent: ag, 
            prestataire: pr, 
            ligne: l, 
            station: s, 
            q1: document.getElementById('q1Eval').value, 
            q2: document.getElementById('q2Eval').value 
        })
    })
    .then(() => { 
        alert("✅ ÉVALUATION ENREGISTRÉE (FEUILLE 3)"); 
        close_m('modalEval'); 
    });
}

    function validerGeneric(btn, action, serv, checkGPS) {
        const m = btn.closest('.modal-content');
        const l = m.querySelector('.sel-ligne').value, s = m.querySelector('.sel-station').value;
        if(!l || !s) return alert("Sélectionnez Ligne et Station !");
        
        navigator.geolocation.getCurrentPosition((pos) => {
            const userLat = pos.coords.latitude;
            const userLon = pos.coords.longitude;
            if (checkGPS) {
                const targetPos = stationsData[l][s];
                const distance = getDistance(userLat, userLon, targetPos[0], targetPos[1]);
                if (distance > 80) return alert("ERREUR GPS : Vous êtes à " + Math.round(distance) + "m de la station. (Limite : 80m)");
            }
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: action, chef: loggedInUser, service: serv, ligne: l, station: s, gps: userLat+","+userLon })})
            .then(() => { alert("✅ ENREGISTRÉ"); close_m(btn.closest('.modal').id); });
        }, () => alert("GPS indisponible ! Activez la localisation."));
    }
</script>
