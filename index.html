<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRETOIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4; --ratp-green: #2ecc71; --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5; --blue-fiance: #3498db;     
            --yellow-gold: #FFC107; --dark-green: #1b5e20; --eval-orange: #e67e22; 
            --ctrl-blue: #2c3e50;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 400px; background: white; padding: 20px 0; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo-casa { width: 60px; } .logo-ratp { width: 80px; }
        h1 { font-family: 'Montserrat', sans-serif; color: var(--ratp-blue); font-size: 1.1rem; text-transform: uppercase; margin: 10px 0 5px; letter-spacing: 2px; font-weight: 900; }
        .sub-title { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; color: #7f8c8d; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .menu-card { padding: 25px 20px; border-radius: 20px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s ease; border: 2px solid rgba(255,255,255,0.1); }
        
        .card-presence { background: var(--blue-fiance); border-left: 12px solid #2980b9; }
        .card-controleur { background: var(--yellow-gold); border-left: 12px solid #f39c12; }
        .card-daily { background: var(--ctrl-blue); border-left: 12px solid #1a252f; }
        .card-eval { background: var(--eval-orange); border-left: 12px solid #d35400; }
        .card-history { background: var(--dark-green); border-left: 12px solid #0a3d0d; }

        .card-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.9rem; color: white; text-transform: uppercase; }
        .card-controleur .card-title { color: #2c3e50; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 92%; max-width: 380px; border-radius: 25px; padding: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 2.2rem; color: #333; cursor: pointer; }
        
        label { display: block; font-weight: 700; font-size: 0.7rem; margin: 12px 0 4px; color: #7f8c8d; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #f1f3f5; border-radius: 10px; font-size: 0.9rem; box-sizing: border-box; }
        
        .ecarts-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .ecart-item { display: flex; align-items: center; font-size: 0.85rem; font-weight: 600; color: #2c3e50; }
        .ecart-item input { width: auto; margin-right: 10px; transform: scale(1.3); }

        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
        .btn-send { background: var(--ratp-blue); }
        #status-bar { position: fixed; bottom: 0; width: 100%; background: white; color: #7f8c8d; text-align: center; padding: 8px; font-size: 0.65rem; font-weight: 700; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <img src="logo_casa_group.png" alt="Logo" class="logo-casa"><br>
    <img src="logo_ratp_dev_casa.png" alt="Logo" class="logo-ratp">
    <h1>GESTION TERRETOIRE</h1>
    <div class="sub-title">Outils Chef de Zone</div>
</div>

<div class="menu-grid">
    <div class="menu-card card-presence" onclick="openModal('modalPresence')"><span class="card-title">PRÉSENCE</span></div>
    <div class="menu-card card-controleur" onclick="openModal('modalTerrain')"><span class="card-title">CONTRÔLEUR DE RONDE</span></div>
    <div class="menu-card card-daily" onclick="openModal('modalDaily')"><span class="card-title">CONTRÔLE QUOTIDIEN</span></div>
    <div class="menu-card card-eval" onclick="openModal('modalEval')"><span class="card-title">CONNAISSANCE DU RÉSEAU</span></div>
    <div class="menu-card card-history" onclick="checkPassword()"><span class="card-title">HISTORIQUE</span></div>
</div>

<div id="modalDaily" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalDaily')">&times;</span>
    <div style="color:var(--ctrl-blue); font-weight:900; margin-bottom:10px;">CONTRÔLE QUOTIDIEN</div>
    
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    
    <label>Prestataire</label>
    <select id="prestataire">
        <option value="">-- Sélectionner --</option>
        <option value="RDCA">RDCA</option>
        <option value="G4S">G4S</option>
        <option value="RMO">RMO</option>
    </select>

    <label>Nom de l'agent</label>
    <input type="text" id="nomAgent" placeholder="Saisir le nom...">

    <label>Écarts constatés</label>
    <div class="ecarts-grid" id="ecartsList">
        <label class="ecart-item"><input type="checkbox" value="Rassemblement"> Rassemblement</label>
        <label class="ecart-item"><input type="checkbox" value="Utilisation du téléphone"> Utilisation du téléphone</label>
        <label class="ecart-item"><input type="checkbox" value="Manque d'intervention F1/F2"> Manque d'intervention F1/F2</label>
        <label class="ecart-item"><input type="checkbox" value="Ne porte pas la tenue"> Ne porte pas la tenue</label>
        <label class="ecart-item"><input type="checkbox" value="Abondement"> Abondement</label>
        <label class="ecart-item"><input type="checkbox" value="Manque d'escorte Tram/Bus"> Manque d'escorte Tram/Bus</label>
    </div>

    <label>Commentaire</label>
    <textarea id="commCtrl" rows="3" placeholder="Notes additionnelles..."></textarea>

    <button class="btn-action btn-send" onclick="validerControleLibre(this)">ENVOYER LE RAPPORT</button>
</div></div>

<div id="modalPresence" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalPresence')">&times;</span>
    <div style="color:var(--ratp-blue); font-weight:900;">PRÉSENCE</div>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action" style="background:var(--ratp-green)" onclick="validerGeneric(this, 'PRISE DE SERVICE', 'Mixte')">PRISE DE SERVICE (MIXTE)</button>
    <button class="btn-action" style="background:var(--ratp-red)" onclick="validerGeneric(this, 'FIN DE SERVICE', 'Matin')">FIN DE SERVICE (MATIN)</button>
</div></div>

<div id="modalTerrain" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalTerrain')">&times;</span>
    <div style="color:var(--yellow-gold); font-weight:900;">CONTRÔLEUR DE RONDE</div>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action" style="background:#2c3e50" onclick="validerGeneric(this, 'TAGUER', 'N/A')">TAGUER LA STATION</button>
</div></div>

<div id="modalEval" class="modal"><div class="modal-content" style="height:80vh; max-width:95%;"><span class="close-btn" onclick="closeModal('modalEval')">&times;</span><iframe src="https://forms.cloud.microsoft/e/7WAqMpwsJJ" style="width:100%;height:100%;border:none;"></iframe></div></div>
<div id="modalHistory" class="modal"><div class="modal-content"><span class="close-btn" onclick="closeModal('modalHistory')">&times;</span><div id="history-list"></div></div></div>

<div id="status-bar">GPS PRÊT</div>

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = function() {
        document.querySelectorAll('.sel-chef').forEach(s => { chefs.sort().forEach(c => { let o = document.createElement('option'); o.value = o.text = c; s.appendChild(o); }); });
        document.querySelectorAll('.sel-ligne').forEach(s => { for (let l in stationsData) { let o = document.createElement('option'); o.value = o.text = l; s.appendChild(o); } });
    };

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Sélectionner --</option>';
        if(stationsData[el.value]) { Object.keys(stationsData[el.value]).forEach(st => { let o = document.createElement('option'); o.value = st; o.text = st; sSelect.appendChild(o); }); }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // FONCTION SANS RESTRICTION GPS (LIBRE)
    function validerControleLibre(btn) {
        const m = btn.closest('.modal-content');
        const chef = m.querySelector('.sel-chef').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        const prest = document.getElementById('prestataire').value, agent = document.getElementById('nomAgent').value, comm = document.getElementById('commCtrl').value;
        let ecarts = [];
        document.querySelectorAll('#ecartsList input:checked').forEach(i => ecarts.push(i.value));

        if(!chef || !ligne || !station || !prest || !agent) return alert("Veuillez remplir toutes les informations.");

        document.getElementById('status-bar').innerText = "📍 RÉCUPÉRATION COORDONNÉES...";
        navigator.geolocation.getCurrentPosition((pos) => {
            const uLat = pos.coords.latitude, uLon = pos.coords.longitude;
            
            // On envoie directement sans vérifier la distance
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ type: "CONTROLE QUOTIDIEN", chef, ligne, station, prestataire: prest, agent, ecarts: ecarts.join(', '), commentaire: comm, gps: uLat+","+uLon })
            }).then(() => {
                alert("✅ RAPPORT TRANSMIS (Distance Libre)");
                closeModal('modalDaily');
                document.getElementById('status-bar').innerText = "✅ PRÊT";
            });
        }, () => alert("GPS REQUIS pour la traçabilité"), {enableHighAccuracy: true});
    }

    // FONCTION AVEC RESTRICTION GPS (80m) pour Présence et Tags
    function validerGeneric(btn, action, serviceAuto) {
        const m = btn.closest('.modal-content');
        const chef = m.querySelector('.sel-chef').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        if(!chef || !ligne || !station) return alert("Champs obligatoires !");
        
        document.getElementById('status-bar').innerText = "📍 GPS EN COURS...";
        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, stationsData[ligne][station][0], stationsData[ligne][station][1]);
            if (dist <= 80) {
                fetch(SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ type: action, chef, service: serviceAuto, ligne, station, gps: pos.coords.latitude+","+pos.coords.longitude })
                }).then(() => {
                    alert("✅ " + action + " ENREGISTRÉ !");
                    closeModal(btn.closest('.modal').id);
                    document.getElementById('status-bar').innerText = "✅ PRÊT";
                });
            } else { alert("❌ TROP LOIN (" + Math.round(dist) + "m)"); }
        }, () => alert("GPS REQUIS"), {enableHighAccuracy: true});
    }

    function checkPassword() {
        if (prompt("Code :") === "1234") { openModal('modalHistory'); }
    }
</script>
</body>
</html>
