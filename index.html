<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRITOIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4; --ratp-green: #2ecc71; --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5; --blue-fiance: #3498db;     
            --yellow-gold: #FFC107; --dark-green: #1b5e20; --eval-orange: #e67e22; 
            --ctrl-blue: #2c3e50; --title-orange: #CC5500;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header encadré blanc */
        .header { 
            text-align: center; margin-bottom: 20px; width: 100%; max-width: 500px; 
            background: white; padding: 20px; border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative;
        }
        
        /* Boutons de navigation internes */
        .nav-container { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .nav-btn-int { 
            padding: 6px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; 
            cursor: pointer; border: none; text-transform: uppercase; display: none;
        }
        .btn-logout { background: var(--ratp-red); color: white; }
        .btn-prev { background: var(--ctrl-blue); color: white; }

        .logo-container { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .logo-ratp { width: 100px; height: auto; } .logo-casa { width: 90px; height: auto; } 
        
        h1 { font-family: 'Montserrat', sans-serif; color: var(--title-orange); font-size: 1.3rem; text-transform: uppercase; margin: 10px 0; font-weight: 900; }
        .user-welcome { color: var(--ratp-blue); font-weight: 800; margin-top: 5px; font-size: 0.95rem; border-top: 1px solid #eee; padding-top: 10px; display: none;}
        
        /* Connexion */
        .card-auth { background: var(--ratp-blue); border-left: 10px solid #003d73; display: block; width: 100%; max-width: 400px; padding: 25px 20px; border-radius: 18px; color: white; text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .sub-click { display: block; font-size: 0.75rem; color: var(--yellow-gold); font-weight: 400; margin-top: 8px; text-decoration: underline; }

        /* Menu */
        .menu-grid { display: none; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .menu-card { padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); cursor: pointer; color: white; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.85rem; border: none; width: 100%; }
        
        .card-presence { background: var(--blue-fiance); border-bottom: 5px solid #2980b9; }
        .card-terrain { background: var(--yellow-gold); border-bottom: 5px solid #f39c12; color: #2c3e50; }
        .card-daily { background: var(--ctrl-blue); border-bottom: 5px solid #1a252f; }
        .card-eval { background: var(--eval-orange); border-bottom: 5px solid #d35400; }
        .card-recap { background: var(--dark-green); border-bottom: 5px solid #0a3d0d; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 380px; border-radius: 20px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 5px; right: 15px; font-size: 2rem; cursor: pointer; }
        
        label { display: block; font-weight: 700; font-size: 0.7rem; margin: 12px 0 4px; color: #7f8c8d; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #f1f3f5; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; margin-bottom: 5px; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f8f9fa; padding: 12px; border-radius: 10px; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.8rem; font-weight: 600; }
        .checkbox-item input { width: 16px; height: 16px; margin-right: 6px; }

        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: 900; margin-top: 10px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-container">
        <button id="logoutBtn" class="nav-btn-int btn-logout" onclick="deconnexion()">Déconnecter</button>
        <button id="prevBtn" class="nav-btn-int btn-prev" onclick="retourArriere()">Précédent</button>
    </div>
    <div class="logo-container">
        <img src="logo_ratp_dev_casa.png" alt="RATP" class="logo-ratp">
        <img src="logo_casa_group.png" alt="CASA" class="logo-casa">
    </div>
    <h1>GESTION TERRITOIRE</h1>
    <div id="userDisplay" class="user-welcome"></div>
</div>

<div id="authSection" class="card-auth" onclick="connexionMatricule()">
    ESPACE CHEF DE ZONE
    <span class="sub-click">Cliquez pour se connecter</span>
</div>

<div id="mainMenu" class="menu-grid">
    <button class="menu-card card-presence" onclick="openModal('modalPresence')">PRÉSENCE</button>
    <button class="menu-card card-terrain" onclick="openModal('modalTerrain')">CONTRÔLEUR DE RONDE</button>
    <button class="menu-card card-daily" onclick="openModal('modalDaily')">CONTRÔLE QUOTIDIEN</button>
    <button class="menu-card card-eval" onclick="openModal('modalEval')">CONNAISSANCE RÉSEAU</button>
    <button class="menu-card card-recap" onclick="openModal('modalRecap')">RÉCAPITULATIF DU JOUR</button>
</div>

<div id="modalTerrain" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalTerrain')">&times;</span>
    <div style="color:var(--yellow-gold); font-weight:900; border-bottom:3px solid var(--yellow-gold); margin-bottom:10px;">CONTRÔLEUR DE RONDE</div>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"></select>
    <label>Station</label><select class="sel-station"></select>
    <button class="btn-action" style="background:var(--ctrl-blue)" onclick="validerGeneric(this, 'TAGUER', 'N/A')">TAGUER STATION</button>
</div></div>

<div id="modalDaily" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalDaily')">&times;</span>
    <div style="color:var(--ctrl-blue); font-weight:900; border-bottom:3px solid var(--ctrl-blue); margin-bottom:10px;">CONTRÔLE QUOTIDIEN</div>
    <label>Heure (24h)</label><input type="time" id="heureCtrl">
    <label>Ligne & Station</label>
    <select class="sel-ligne" onchange="updateStations(this)"></select>
    <select class="sel-station"></select>
    <label>Agent Contrôlé</label><input type="text" id="nomAgentDaily">
    <label style="color:var(--ratp-red)">Écarts constatés</label>
    <div class="checkbox-group" id="groupEcarts">
        <label class="checkbox-item"><input type="checkbox" value="Tenue"> Tenue</label>
        <label class="checkbox-item"><input type="checkbox" value="Badge"> Badge</label>
        <label class="checkbox-item"><input type="checkbox" value="Poste"> Poste</label>
        <label class="checkbox-item"><input type="checkbox" value="Ponctualité"> Ponctualité</label>
    </div>
    <button class="btn-action" style="background:var(--ratp-blue)" onclick="validerControleLibre()">ENVOYER</button>
</div></div>

<div id="modalPresence" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="close_m('modalPresence')">&times;</span>
    <div style="color:var(--blue-fiance); font-weight:900; border-bottom:3px solid var(--blue-fiance); margin-bottom:10px;">PRÉSENCE</div>
    <label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"></select>
    <label>Station</label><select class="sel-station"></select>
    <button class="btn-action" style="background:var(--ratp-green)" onclick="validerGeneric(this, 'PRISE DE SERVICE', 'SERVICE MIXTE')">PRISE (MIXTE)</button>
    <button class="btn-action" style="background:var(--ratp-red)" onclick="validerGeneric(this, 'FIN DE SERVICE', 'SERVICE MATIN')">FIN (MATIN)</button>
</div></div>

<div id="modalEval" class="modal"><div class="modal-content"><span class="close-btn" onclick="close_m('modalEval')">&times;</span><div style="color:var(--eval-orange); font-weight:900; border-bottom:3px solid var(--eval-orange); margin-bottom:10px;">CONNAISSANCE RÉSEAU</div><label>Agent</label><input type="text" id="nomAgentEval"><label>Ligne</label><select class="sel-ligne" onchange="updateStations(this)"></select><label>Station</label><select class="sel-station"></select><button class="btn-action" style="background:var(--eval-orange)" onclick="alert('Enregistré')">VALIDER</button></div></div>
<div id="modalRecap" class="modal"><div class="modal-content" style="max-width:95%; height:80vh;"><span class="close-btn" onclick="close_m('modalRecap')">&times;</span><iframe src="https://docs.google.com/spreadsheets/d/1_TNVG7NIdZ-vWqA_v8E4WbLhG7-l8mR6-Yp1E6s-4Xw/preview" style="width:100%;height:100%;border:none;"></iframe></div></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFzNUINWDDMdQIx_JnBa-X6lIxSr0pZEpw-wZP2_fq6Jp6beQFDhkoVNkuSyP_BS1lDg/exec";
    const stationsData = { "T1": {"Sidi Moumen": [33.58, -7.50], "Lissasfa": [33.53, -7.66]}, "T2": {"Sidi Bernoussi": [33.61, -7.50], "Ain Diab": [33.58, -7.68]}, "T3": {"Casa Port": [33.59, -7.61]}, "T4": {"Oulad Ziane": [33.57, -7.58]}, "BW1": {"Salmia": [33.53, -7.55]}, "BW2": {"Errahma": [33.53, -7.72]} };
    const chefsData = {"1436":"Redouane Zaoui", "355":"Mouhcin RACHDAOUI", "90":"Fouad MAHMAH", "72":"Zakia AMMARI"};

    let loggedInUser = "";

    function connexionMatricule() {
        let pass = prompt("Mot de passe (RATPDEV_matricule) :");
        if (pass && pass.startsWith("RATPDEV_")) {
            let mat = pass.replace("RATPDEV_", "");
            if (chefsData[mat]) {
                loggedInUser = chefsData[mat];
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainMenu').style.display = 'grid';
                document.getElementById('userDisplay').innerHTML = `Bonjour Chef de Zone : <b>${loggedInUser}</b>`;
                document.getElementById('userDisplay').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('prevBtn').style.display = 'block';
                remplirLignes();
                return;
            }
        }
        alert("Accès refusé.");
    }

    function deconnexion() { if(confirm("Déconnexion ?")) location.reload(); }
    function retourArriere() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function close_m(id) { document.getElementById(id).style.display = 'none'; }

    function remplirLignes() {
        document.querySelectorAll('.sel-ligne').forEach(s => {
            s.innerHTML = '<option value="">-- Ligne --</option>';
            for (let l in stationsData) { s.innerHTML += `<option value="${l}">${l}</option>`; }
        });
    }

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Station --</option>';
        if(stationsData[el.value]) {
            Object.keys(stationsData[el.value]).forEach(st => { sSelect.innerHTML += `<option value="${st}">${st}</option>`; });
        }
    }

    function validerControleLibre() {
        const boxes = document.querySelectorAll('#groupEcarts input:checked');
        let ec = Array.from(boxes).map(b => b.value).join(', ');
        const h = document.getElementById('heureCtrl').value, l = document.querySelector('#modalDaily .sel-ligne').value;
        const s = document.querySelector('#modalDaily .sel-station').value;
        if(!h || !l || !s) return alert("Champs obligatoires !");
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "CONTROLE_QUOTIDIEN", chef: loggedInUser, heure: h, ligne: l, station: s, ecarts: ec || "Aucun" })})
        .then(() => { alert("✅ ENVOYÉ"); close_m('modalDaily'); });
    }

    function validerGeneric(btn, action, serv) {
        const m = btn.closest('.modal-content');
        const l = m.querySelector('.sel-ligne').value, s = m.querySelector('.sel-station').value;
        if(!l || !s) return alert("Sélectionnez Ligne et Station !");
        navigator.geolocation.getCurrentPosition((pos) => {
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: action, chef: loggedInUser, service: serv, ligne: l, station: s, gps: pos.coords.latitude+","+pos.coords.longitude })})
            .then(() => { alert("✅ ENREGISTRÉ"); close_m(btn.closest('.modal').id); });
        }, () => alert("GPS bloqué !"));
    }
</script>
</body>
</html>
