<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTION TERRETOIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-blue: #0055A4;
            --ratp-green: #2ecc71;
            --ratp-red: #e74c3c;
            --bg-gray: #f0f2f5;
            --blue-fiance: #3498db;     
            --yellow-gold: #FFC107;     
            --dark-green: #1b5e20;      
            --eval-orange: #e67e22; 
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-gray);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { 
            text-align: center; margin-bottom: 25px; width: 100%; max-width: 400px; 
            background: white; padding: 20px 0; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo-casa { width: 80px; margin-bottom: 5px; }
        .logo-ratp { width: 100px; }
        
        h1 { 
            font-family: 'Montserrat', sans-serif;
            color: var(--ratp-blue); font-size: 1.1rem; 
            text-transform: uppercase; margin-top: 10px; margin-bottom: 5px;
            letter-spacing: 2px; font-weight: 900;
        }
        .sub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; color: #7f8c8d; font-weight: 700;
            text-transform: uppercase; letter-spacing: 3px;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; }

        .menu-card {
            padding: 35px 20px; border-radius: 24px;
            text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            cursor: pointer; transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .menu-card:active { transform: scale(0.96); }
        
        .card-presence { background: var(--blue-fiance); border-left: 15px solid #2980b9; }
        .card-controleur { background: var(--yellow-gold); border-left: 15px solid #f39c12; }
        .card-eval { background: var(--eval-orange); border-left: 15px solid #d35400; }
        .card-history { background: var(--dark-green); border-left: 15px solid #0a3d0d; }

        .card-title { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 1rem; color: white; 
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        .card-controleur .card-title { color: #2c3e50; text-shadow: none; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.9); backdrop-filter: blur(5px);
            z-index: 1000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: white; width: 92%; max-width: 380px; border-radius: 30px;
            padding: 25px; position: relative; max-height: 85vh; overflow-y: auto;
        }

        .modal-eval-content { max-width: 95%; width: 95%; height: 90vh; padding: 10px; padding-top: 40px; }

        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 2.5rem; color: #333; cursor: pointer; z-index: 100; }
        
        iframe { width: 100%; height: 100%; border: none; border-radius: 15px; }

        label { display: block; font-weight: 700; font-size: 0.75rem; margin: 15px 0 6px; color: #7f8c8d; text-transform: uppercase; }
        select { width: 100%; padding: 14px; border: 2px solid #f1f3f5; border-radius: 12px; font-size: 0.95rem; font-weight: 600; }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 15px; color: white; font-weight: 900; font-size: 0.9rem; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-tag { background: #2c3e50; }
        .btn-prise { background: var(--ratp-green); margin-bottom: 10px; }
        .btn-fin { background: var(--ratp-red); }

        #status-bar { position: fixed; bottom: 0; width: 100%; background: white; color: #7f8c8d; text-align: center; padding: 10px; font-size: 0.7rem; font-weight: 700; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <img src="logo_casa_group.png" alt="Logo" class="logo-casa"><br>
    <img src="logo_ratp_dev_casa.png" alt="Logo" class="logo-ratp">
    <h1>GESTION TERRETOIRE</h1>
    <div class="sub-title">Chef de zone</div>
</div>

<div class="menu-grid">
    <div class="menu-card card-presence" onclick="openModal('modalPresence')">
        <span class="card-title">PRÉSENCE</span>
    </div>
    <div class="menu-card card-controleur" onclick="openModal('modalTerrain')">
        <span class="card-title">CONTRÔLEUR DE RONDE</span>
    </div>
    <div class="menu-card card-eval" onclick="openModal('modalEval')">
        <span class="card-title">CONNAISSANCE DU RÉSEAU</span>
    </div>
    <div class="menu-card card-history" onclick="checkPassword()">
        <span class="card-title">HISTORIQUE</span>
    </div>
</div>

<div id="modalEval" class="modal">
    <div class="modal-content modal-eval-content">
        <span class="close-btn" onclick="closeModal('modalEval')">&times;</span>
        <iframe src="https://forms.cloud.microsoft/e/7WAqMpwsJJ">Chargement...</iframe>
    </div>
</div>

<div id="modalPresence" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalPresence')">&times;</span>
    <div style="color:var(--ratp-blue); font-weight:900; margin-bottom:20px;">PRÉSENCE</div>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Service</label><select class="sel-service"><option value="">-- Choisir --</option><option value="Matin">Matin</option><option value="Mixte">Mixte</option></select>
    <label>Ligne / Dépôt</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station / Lieu</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action btn-prise" onclick="valider(this, 'PRISE DE SERVICE (MIXTE)')">PRISE DE SERVICE (MIXTE)</button>
    <button class="btn-action btn-fin" onclick="valider(this, 'FIN DE SERVICE (MATIN)')">FIN DE SERVICE (MATIN)</button>
</div></div>

<div id="modalTerrain" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalTerrain')">&times;</span>
    <div style="color:var(--ratp-blue); font-weight:900; margin-bottom:20px;">CONTRÔLEUR DE RONDE</div>
    <label>Chef de Zone</label><select class="sel-chef"><option value="">-- Sélectionner --</option></select>
    <label>Service</label><select class="sel-service"><option value="">-- Choisir --</option><option value="Matin">Matin</option><option value="Mixte">Mixte</option></select>
    <label>Ligne / Réseau</label><select class="sel-ligne" onchange="updateStations(this)"><option value="">-- Choisir --</option></select>
    <label>Station / Lieu</label><select class="sel-station"><option value="">-- Sélectionner --</option></select>
    <button class="btn-action btn-tag" onclick="valider(this, 'TAGUER')">TAGUER</button>
</div></div>

<div id="modalHistory" class="modal"><div class="modal-content">
    <span class="close-btn" onclick="closeModal('modalHistory')">&times;</span>
    <div style="color:var(--ratp-blue); font-weight:900; margin-bottom:20px;">HISTORIQUE</div>
    <div id="history-list">Chargement...</div>
</div></div>

<div id="status-bar">CONNECTÉ</div>

<script>
    const PASSWORD_ADMIN = "1234";
    const chefs = ["Redouane Zaoui", "Fouad MAHMAH", "Zakia AMMARI", "Monsif MARZOUK", "Hassan MOUTTAQUINE", "El mostafa ERRAHMOUNI", "Youssef ABOUHILAL", "Anass CHOUKRI", "Rachid BAZZAZ", "Aicha ESSAHMI", "Youssef EZZAMANIDI", "Ayoub AQASBY", "Mohamed FRIMAN", "Ouissal NASSOUHE", "Mohamed REGRAGUI", "Taha NAJHI", "Mohamed CHAGUE", "Mohamed SADOK", "Samir HOUD", "Youness MAATOUS", "Azddine GOUTE", "Nourddine KARDANE", "Abdelilah HARIRI", "Bader HAMDA", "Abdelkader OUELDBA", "Samir HARIRI", "Samir AKLIA", "Zakaria LAHMITI", "Elbouazzaoui ERRAKI", "Hicham ZAHIDI", "Mounsif FOUAD", "Rachid EL HAFYANI", "El Mehdi EL MISSIOUI", "Fahd CHAHTI", "Amine MOUSSADAK", "Mouhcin RACHDAOUI", "Wadii LARHA", "Ouahid LAYLI", "Siham KASSEMI", "Aziz DOUMI", "Abderrahman BECHTAOUI"];
    const structureData = { "Dépôts": ["Dépôt Hantat", "Dépôt Sidi Moumen", "Dépôt CDR", "Dépôt Sidi Bernoussi"], "Lignes": ["T1", "T2", "T3", "T4", "BW1", "BW2"] };
    const stationsData = { 
        "Dépôt Hantat": ["Loge", "Atelier", "Bureaux"], "Dépôt Sidi Moumen": ["Loge", "Atelier", "PCC"], "Dépôt CDR": ["Loge", "Atelier"], "Dépôt Sidi Bernoussi": ["Loge", "Atelier"],
        "T1": ["Sidi Moumen Terminus", "Ennassim", "Mohammed Zefzaf", "Centre de Maintenance", "Hôpital Sidi Moumen", "Attacharouk", "Okba Ibn Nafii", "Forces Auxiliaires", "Hay Raja", "Ibn Tachfine", "Hay Mohammadi", "Achouhada", "Ali Yaata", "Grande Ceinture", "Anciens Abattoirs", "Bahmad", "Casa Voyageurs", "Place Al Yassir", "La Résistance", "Mohamed Diouri", "Marché Central", "Place des Nations Unies", "Place Mohammed V", "Avenue Hassan II", "Les Hôpitaux", "Faculté de Médécine", "Abdelmoumen", "Bachkou", "Mekka", "Gare Oasis", "Panoramique", "Technopark", "Zenith", "Gare Casa Sud", "Facultés", "Laymoune", "Lissasfa Terminus"],
        "T2": ["Sidi Bernoussi Terminus", "Abi Dar El Ghafari", "Gare De Ain Sbaa", "Préfecture Ain Sbaa", "Al Amane", "Al wifaq", "Dar Laman", "Carrières Centrales", "Kissariat Hay Mohammadi", "Mdakra", "Hay Adil", "Derb Milan", "Hay El Farah", "Derb Sultan", "Place Sraghna", "El Fida", "2 Mars", "Hermitage", "Anoual", "Derb Ghalef", "Riviera", "Ghandi", "Beauséjour", "Anfa Clubs", "Anfa Park", "Place Financière", "Abdellah Ben Cherif", "Cité De L'air", "Sidi Abderrahmane", "Hay Hassani", "Littoral", "Ain Diab Plage Terminus"],
        "T3": ["Casa Port Terminus", "Mohammed Smiha", "Place De La victoir", "Mohamed Zerktouni", "Habous", "Garage allal", "Derb Tolba", "Derb Chorfa", "Abou Couaib Doukali", "Afriquia", "Dar Attouzani", "BD Mohammed VI", "6 NOUVEMBRE", "Abdessalam Ennaciri", "Jardin Alesco", "Hay Lalla Mariem", "Idriss El Allam", "Abdelkader Essahraoui", "10 Mars", "Hay Alwahda Terminus"],
        "T4": ["Mohammed Erradi Terminus", "Zone Industrielle", "Moulay Rachid", "Mohammed Joudar", "Faculté Ben Msik", "Hay El Falah", "Driss El Harti", "Mohammed Bouziane", "Hay Assalama", "Nil", "Jardin Chtaiba", "Hay Tissir", "Gare Oulad Ziane", "In Borja", "Ifni", "La Girande", "Jabir Ibn Hayane", "Mers Sultan", "Parc De La Ligue Arabe Terminus"],
        "BW1": ["Salmia 2 Terminus", "Sbata", "Stade Tessema", "Al Joulane", "Lahrizi", "Jardin Sunday", "Amgala", "Al Qods", "Sefrou", "Taza", "Al Inara", "Oulad Haddou", "Hay Chrifa", "Taddart", "Azzohour", "Californie", "Casa Nearshore", "Al Moustakbal", "Sidi Maarouf", "Omar Al Khayam Terminus"],
        "BW2": ["Oulmes Terminus", "Yaacoub Al Mansour", "C.I.L.", "Aéropostale", "Les musées", "Oued Oum Rabia", "Oued Laou", "Oued Beht", "Moulouya", "Haj Fateh", "Essafa", "Moulay Thami", "Abouab Oulfa", "La Rocade", "La Perception", "Les Jardins D’Errahma", "Errahma", "Oued Sbou", "Les Ecoles", "Ouled Ahmed", "La Ferme", "Ouled Azzouz Terminus"]
    };

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function checkPassword() {
        let p = prompt("Code Historique :");
        if (p === PASSWORD_ADMIN) { showHistory(); } 
        else if (p !== null) { alert("Accès Refusé."); }
    }

    function showHistory() {
        const list = document.getElementById('history-list');
        const data = JSON.parse(localStorage.getItem('ronde_logs') || '[]');
        list.innerHTML = data.length === 0 ? "Aucun historique." : data.map(i => `<div style="border-bottom:1px solid #eee; padding:10px 0;"><small>${i.date}</small><br><b>${i.type}</b><br>${i.station}</div>`).join('');
        openModal('modalHistory');
    }

    window.onload = function() {
        document.querySelectorAll('.sel-chef').forEach(s => { chefs.sort().forEach(c => { let o = document.createElement('option'); o.value = o.text = c; s.appendChild(o); }); });
        document.querySelectorAll('.sel-ligne').forEach(s => { for (let cat in structureData) { let g = document.createElement('optgroup'); g.label = cat; structureData[cat].forEach(l => { let o = document.createElement('option'); o.value = o.text = l; g.appendChild(o); }); s.appendChild(g); } });
    };

    function updateStations(el) {
        const sSelect = el.closest('.modal-content').querySelector('.sel-station');
        sSelect.innerHTML = '<option value="">-- Sélectionner --</option>';
        if (stationsData[el.value]) { stationsData[el.value].forEach(st => { let o = document.createElement('option'); o.value = o.text = st; sSelect.appendChild(o); }); }
    }

    function valider(btn, type) {
        const m = btn.closest('.modal-content');
        const chef = m.querySelector('.sel-chef').value, service = m.querySelector('.sel-service').value, ligne = m.querySelector('.sel-ligne').value, station = m.querySelector('.sel-station').value;
        if(!chef || !service || !ligne || !station) return alert("Champs obligatoires !");
        
        document.getElementById('status-bar').innerText = "📍 LOCALISATION...";
        navigator.geolocation.getCurrentPosition((pos) => {
            fetch("https://script.google.com/macros/s/AKfycbwteA6ZOpZPUA_-T7QkYqIRUVH3_t4EDCmAlRpemSUEfrs0EtYJtrrYy7JUQA-ARP-NpQ/exec", {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ type, chef, service, ligne, station, gps: pos.coords.latitude+","+pos.coords.longitude })
            }).then(() => {
                let logs = JSON.parse(localStorage.getItem('ronde_logs') || '[]');
                logs.unshift({ type, station, date: new Date().toLocaleString() });
                localStorage.setItem('ronde_logs', JSON.stringify(logs.slice(0,10)));
                alert("✅ TRANSMIS !");
                closeModal(btn.closest('.modal').id);
                document.getElementById('status-bar').innerText = "✅ PRÊT";
            });
        }, () => alert("GPS REQUIS"), {enableHighAccuracy:true});
    }
</script>
</body>
</html>
